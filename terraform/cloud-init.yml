#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose
  - curl
  - wget
  - nginx
  - postgresql-client
  - at  # For scheduling auto-termination

# Create budget user
users:
  - name: budget
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    home: /home/budget

# Write environment file
write_files:
  - path: /home/budget/.env
    content: |
      DATABASE_URL=${database_url}
      PORT=${app_port}
      ENV=production
      LOG_LEVEL=info
      GITHUB_REPO=${github_repo}
      GITHUB_BRANCH=${github_branch}
      AUTO_TERMINATE_MINUTES=${auto_terminate_minutes}
    owner: budget:budget
    permissions: '0600'
  
  - path: /home/budget/docker-compose.yml
    content: |
      version: '3.8'
      services:
        postgres:
          image: postgres:16-alpine
          container_name: budget-postgres
          restart: unless-stopped
          environment:
            POSTGRES_DB: budget
            POSTGRES_USER: budget_user
            POSTGRES_PASSWORD: budget_password
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
          volumes:
            - postgres_data:/var/lib/postgresql/data
          networks:
            - budget-network
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U budget_user -d budget"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

        app:
          image: ${docker_image_url}
          container_name: budget-app
          restart: unless-stopped
          ports:
            - "${app_port}:${app_port}"
          env_file:
            - .env
          depends_on:
            postgres:
              condition: service_healthy
          networks:
            - budget-network
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${app_port}/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

        nginx:
          image: nginx:alpine
          container_name: budget-nginx
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
          depends_on:
            - app
          networks:
            - budget-network

      networks:
        budget-network:
          driver: bridge

      volumes:
        postgres_data:
          driver: local
    owner: budget:budget
    permissions: '0644'

  - path: /home/budget/nginx.conf
    content: |
      events {
          worker_connections 1024;
      }

      http {
          upstream app {
              server app:${app_port};
          }

          server {
              listen 80;
              server_name _;

              # Health check endpoint
              location /health {
                  proxy_pass http://app;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # Main application
              location / {
                  proxy_pass http://app;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Real-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 30s;
                  proxy_send_timeout 30s;
                  proxy_read_timeout 30s;
              }
          }
      }
    owner: budget:budget
    permissions: '0644'

  - path: /home/budget/deploy.sh
    content: |
      #!/bin/bash
      set -e
      
      echo "$(date): Starting pre-built image deployment..." | tee -a /var/log/deployment.log

      cd /home/budget
      
      # Login to GitHub Container Registry
      echo "$(date): Logging into GitHub Container Registry..." | tee -a /var/log/deployment.log
      echo "${github_token}" | docker login ghcr.io -u github --password-stdin
      
      # Pull the pre-built image
      echo "$(date): Pulling Docker image ${docker_image_url}..." | tee -a /var/log/deployment.log
      if ! docker pull ${docker_image_url}; then
        echo "$(date): Failed to pull Docker image" | tee -a /var/log/deployment.log
        exit 1
      fi
      
      # Start containers
      echo "$(date): Starting containers..." | tee -a /var/log/deployment.log
      docker-compose down 2>/dev/null || true
      docker-compose up -d
      
      # Wait for PostgreSQL
      echo "$(date): Waiting for PostgreSQL..." | tee -a /var/log/deployment.log
      timeout 120 bash -c 'until docker-compose exec -T postgres pg_isready -U budget_user -d budget; do sleep 2; done'
      
      # Wait for application
      echo "$(date): Waiting for application..." | tee -a /var/log/deployment.log
      timeout 120 bash -c 'until curl -f http://localhost:${app_port}/health; do sleep 2; done'
      
      # Run migrations
      echo "$(date): Running database migrations..." | tee -a /var/log/deployment.log
      docker-compose exec -T app ./budget migrate 2>&1 | tee -a /var/log/deployment.log || echo "Migration command not available"
      
      echo "$(date): Deployment completed successfully!" | tee -a /var/log/deployment.log
    owner: budget:budget
    permissions: '0755'

  - path: /home/budget/auto-terminate.sh
    content: |
      #!/bin/bash
      echo "$(date): Auto-termination check triggered after ${auto_terminate_minutes} minutes" | tee -a /var/log/auto-terminate.log
      echo "Deployment info: Repo=${github_repo}, Branch=${github_branch}" | tee -a /var/log/auto-terminate.log
      
      # Check if deployment was successful by testing health endpoint
      if curl -f --connect-timeout 5 http://localhost:8080/health >/dev/null 2>&1; then
        echo "$(date): ✅ Deployment successful - proceeding with auto-termination" | tee -a /var/log/auto-terminate.log
        
        # Stop the application gracefully
        cd /home/budget
        docker-compose down 2>&1 | tee -a /var/log/auto-terminate.log
        
        # Shutdown the system
        echo "$(date): Shutting down system..." | tee -a /var/log/auto-terminate.log
        shutdown -h now
      else
        echo "$(date): ❌ Deployment failed or app not responding - PRESERVING DROPLET for debugging" | tee -a /var/log/auto-terminate.log
        echo "$(date): Check logs at http://$(curl -s http://169.254.169.254/metadata/v1/interfaces/public/0/ipv4/address):9999/status" | tee -a /var/log/auto-terminate.log
        echo "$(date): Droplet will remain running for manual investigation" | tee -a /var/log/auto-terminate.log
        
        # Schedule another check in 60 minutes (in case it's just slow)
        echo "/home/budget/auto-terminate.sh" | at now + 60 minutes
        echo "$(date): Scheduled another termination check in 60 minutes" | tee -a /var/log/auto-terminate.log
      fi
    owner: budget:budget
    permissions: '0755'

  - path: /home/budget/status-server.py
    content: |
      #!/usr/bin/env python3
      import http.server
      import socketserver
      import json
      import subprocess
      import os
      from datetime import datetime
      
      class StatusHandler(http.server.SimpleHTTPRequestHandler):
          def do_GET(self):
              if self.path == '/status':
                  self.send_response(200)
                  self.send_header('Content-type', 'application/json')
                  self.send_header('Access-Control-Allow-Origin', '*')
                  self.end_headers()
                  
                  # Get deployment status
                  status = {
                      "timestamp": datetime.now().isoformat(),
                      "cloud_init_finished": os.path.exists("/var/lib/cloud/instance/boot-finished"),
                      "deployment_log_exists": os.path.exists("/var/log/deployment.log"),
                      "docker_running": False,
                      "containers": [],
                      "services": {},
                      "deployment_log": []
                  }
                  
                  try:
                      # Check Docker
                      result = subprocess.run(["docker", "ps", "--format", "table {{.Names}}\t{{.Status}}"], 
                                            capture_output=True, text=True, timeout=5)
                      status["docker_running"] = result.returncode == 0
                      if result.returncode == 0:
                          status["containers"] = result.stdout.strip().split('\n')
                  except Exception as e:
                      status["docker_error"] = str(e)
                  
                  try:
                      # Check systemd services
                      for service in ["docker", "budget-app", "atd"]:
                          result = subprocess.run(["systemctl", "is-active", service], 
                                                capture_output=True, text=True, timeout=5)
                          status["services"][service] = result.stdout.strip()
                  except Exception as e:
                      status["systemctl_error"] = str(e)
                  
                  # Read deployment log if exists
                  if os.path.exists("/var/log/deployment.log"):
                      try:
                          with open("/var/log/deployment.log", "r") as f:
                              lines = f.read().strip().split('\n')
                              status["deployment_log"] = lines[-20:]  # Last 20 lines
                      except Exception as e:
                          status["log_read_error"] = str(e)
                  
                  # Check cloud-init status
                  try:
                      if os.path.exists("/var/log/cloud-init-output.log"):
                          with open("/var/log/cloud-init-output.log", "r") as f:
                              lines = f.read().strip().split('\n')
                              status["cloud_init_log"] = lines[-10:]  # Last 10 lines
                  except Exception as e:
                      status["cloud_init_log_error"] = str(e)
                  
                  self.wfile.write(json.dumps(status, indent=2).encode())
              else:
                  self.send_response(404)
                  self.end_headers()
      
      print(f"Starting status server on port 9999 at {datetime.now()}")
      with socketserver.TCPServer(("", 9999), StatusHandler) as httpd:
          httpd.serve_forever()
    owner: root:root
    permissions: '0755'

  - path: /etc/systemd/system/status-server.service
    content: |
      [Unit]
      Description=Deployment Status Server
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 /home/budget/status-server.py
      Restart=always
      RestartSec=5
      User=root

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

  - path: /etc/systemd/system/budget-app.service
    content: |
      [Unit]
      Description=Budget Application
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/home/budget
      ExecStart=/home/budget/deploy.sh
      TimeoutStartSec=300
      User=budget
      Group=budget

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker budget
  - chown -R budget:budget /home/budget
  
  # Start status server first for diagnostics
  - systemctl daemon-reload
  - systemctl enable status-server.service
  - systemctl start status-server.service
  - echo "Status server started on port 9999"
  
  # Start main application deployment
  - systemctl enable budget-app.service
  - systemctl start budget-app.service
  
  # Schedule auto-termination (will check if deployment succeeded)
  - systemctl enable atd
  - systemctl start atd
  - |
    echo "/home/budget/auto-terminate.sh" | at now + ${auto_terminate_minutes} minutes
    echo "$(date): Smart auto-termination scheduled for ${auto_terminate_minutes} minutes from now" | tee -a /var/log/auto-terminate.log
    echo "$(date): If deployment fails, droplet will be preserved for debugging" | tee -a /var/log/auto-terminate.log

final_message: "Budget app server setup complete. Status server running on port 9999. Pre-built image deployment started. Smart auto-termination scheduled for ${auto_terminate_minutes} minutes (will preserve failed deployments)."