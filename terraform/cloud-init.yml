#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose
  - git
  - curl
  - wget
  - unzip
  - nginx
  - postgresql-client  # For PostgreSQL access
  - at  # For scheduling auto-termination

# Create budget user
users:
  - name: budget
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    home: /home/budget

# Write environment file
write_files:
  - path: /home/budget/.env
    content: |
      DATABASE_URL=${database_url}
      PORT=${app_port}
      ENV=production
      LOG_LEVEL=info
      GITHUB_REPO=${github_repo}
      GITHUB_BRANCH=${github_branch}
      AUTO_TERMINATE_MINUTES=${auto_terminate_minutes}
    owner: budget:budget
    permissions: '0600'
  
  - path: /home/budget/docker-compose.yml
    content: |
      version: '3.8'
      services:
        postgres:
          image: postgres:16-alpine
          container_name: budget-postgres
          restart: unless-stopped
          environment:
            POSTGRES_DB: budget
            POSTGRES_USER: budget_user
            POSTGRES_PASSWORD: budget_password
            POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
          volumes:
            - postgres_data:/var/lib/postgresql/data
          networks:
            - budget-network
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U budget_user -d budget"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
          # No ports exposed - only accessible from within Docker network

        app:
          image: budget-app:latest
          container_name: budget-app
          restart: unless-stopped
          ports:
            - "${app_port}:${app_port}"
          env_file:
            - .env
          depends_on:
            postgres:
              condition: service_healthy
          networks:
            - budget-network
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${app_port}/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

        nginx:
          image: nginx:alpine
          container_name: budget-nginx
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
          depends_on:
            - app
          networks:
            - budget-network

      networks:
        budget-network:
          driver: bridge

      volumes:
        postgres_data:
          driver: local
    owner: budget:budget
    permissions: '0644'

  - path: /home/budget/nginx.conf
    content: |
      events {
          worker_connections 1024;
      }

      http {
          upstream app {
              server app:${app_port};
          }

          server {
              listen 80;
              server_name _;

              # Health check endpoint
              location /health {
                  proxy_pass http://app;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              # Main application
              location / {
                  proxy_pass http://app;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 30s;
                  proxy_send_timeout 30s;
                  proxy_read_timeout 30s;
              }
          }
      }
    owner: budget:budget
    permissions: '0644'

  - path: /home/budget/deploy.sh
    content: |
      #!/bin/bash
      set -e

      echo "Starting deployment..."

      # Pull latest code (this would be customized based on your CI/CD setup)
      cd /home/budget

      # Build the Docker image (assuming the code is already present)
      if [ -d "budget-app" ]; then
          cd budget-app
          docker build -t budget-app:latest .
          cd ..
      fi

      # Stop existing containers
      docker-compose down

      # Start new containers
      docker-compose up -d

      # Wait for health check
      echo "Waiting for application to be healthy..."
      timeout 120 bash -c 'until curl -f http://localhost:${app_port}/health; do sleep 2; done'

      echo "Deployment completed successfully!"
    owner: budget:budget
    permissions: '0755'

  - path: /etc/systemd/system/budget-app.service
    content: |
      [Unit]
      Description=Budget Application
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/home/budget
      ExecStart=/usr/bin/docker-compose up -d
      ExecStop=/usr/bin/docker-compose down
      TimeoutStartSec=0
      User=budget
      Group=budget

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

  - path: /home/budget/auto-terminate.sh
    content: |
      #!/bin/bash
      echo "Auto-termination triggered after ${auto_terminate_minutes} minutes"
      echo "Deployment info: Repo=${github_repo}, Branch=${github_branch}"
      
      # Stop the application gracefully
      cd /home/budget
      docker-compose down
      
      # Send termination signal to the droplet (this will destroy it)
      # Using DigitalOcean metadata service to get droplet ID
      DROPLET_ID=$(curl -s http://169.254.169.254/metadata/v1/id)
      
      # Log the termination
      echo "$(date): Auto-termination executed for droplet $DROPLET_ID" >> /var/log/auto-terminate.log
      
      # Shutdown the system
      shutdown -h now
    owner: budget:budget
    permissions: '0755'

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker budget
  - chown -R budget:budget /home/budget
  - systemctl daemon-reload
  - systemctl enable budget-app.service
  
  # Create a simple health check endpoint script for now
  - |
    mkdir -p /home/budget/health
    cat > /home/budget/health/index.html << 'EOF'
    <!DOCTYPE html>
    <html>
    <head><title>Budget App Health</title></head>
    <body><h1>OK</h1><p>Budget application is running</p></body>
    </html>
    EOF
    chown -R budget:budget /home/budget/health

  # Setup a simple HTTP server for health checks until the app is deployed
  - |
    cat > /etc/systemd/system/health-server.service << 'EOF'
    [Unit]
    Description=Temporary Health Server
    After=network.target

    [Service]
    Type=simple
    User=budget
    WorkingDirectory=/home/budget/health
    ExecStart=/usr/bin/python3 -m http.server ${app_port}
    Restart=always

    [Install]
    WantedBy=multi-user.target
    EOF

  - systemctl daemon-reload
  - systemctl enable health-server.service
  - systemctl start health-server.service

  # Create directory for PostgreSQL data persistence
  - mkdir -p /home/budget/postgres_data
  - chown -R budget:budget /home/budget/postgres_data

  # Schedule auto-termination
  - systemctl enable atd
  - systemctl start atd
  - |
    echo "/home/budget/auto-terminate.sh" | at now + ${auto_terminate_minutes} minutes
    echo "Auto-termination scheduled for ${auto_terminate_minutes} minutes from now"

final_message: "Budget app server setup complete. Auto-termination scheduled for ${auto_terminate_minutes} minutes. Ready for deployment!"