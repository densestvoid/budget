name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if no changes detected'
        required: false
        type: boolean
        default: false

# Prevent concurrent production deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
  AWS_REGION: ${{ vars.TERRAFORM_AWS_S3_REGION }}

jobs:
  go-checks:
    uses: densestvoid/workflows/.github/workflows/go-checks.yml@main

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: go-checks
    
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate deployment ID
      id: deployment_id
      run: |
        # Generate production deployment ID
        TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
        DEPLOYMENT_ID="prod-${TIMESTAMP}"
        
        echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> $GITHUB_ENV
        echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
        echo "Deployment ID: ${DEPLOYMENT_ID}"
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Check build requirements and caches
      id: build_cache
      run: |
        echo "🔍 Analyzing build requirements..."
        
        # Create hash of Go source files
        GO_HASH=$(find . -name "*.go" -o -name "go.mod" -o -name "go.sum" | \
          sort | xargs cat | sha256sum | cut -d' ' -f1)
        echo "GO_HASH=${GO_HASH}" >> $GITHUB_ENV
        echo "Go source hash: ${GO_HASH}"
        
        # Create hash of all files that affect Docker image
        DOCKER_HASH=$(find . -name "*.go" -o -name "go.mod" -o -name "go.sum" -o -name "Dockerfile.prod" -o -name "config.yaml" -o -path "./scripts/*" -o -path "./templates/*" | \
          sort | xargs cat | sha256sum | cut -d' ' -f1)
        echo "DOCKER_HASH=${DOCKER_HASH}" >> $GITHUB_ENV
        echo "Docker context hash: ${DOCKER_HASH}"
        
        # Set image tag based on content hash
        IMAGE_TAG="${{ env.DEPLOYMENT_ID }}-${DOCKER_HASH}"
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        
        # Check if Docker image already exists in GHCR
        echo "🔍 Checking if Docker image exists in registry..."
        if docker manifest inspect ghcr.io/${{ github.repository }}/budget-app:${IMAGE_TAG} >/dev/null 2>&1; then
          echo "✅ Docker image exists - skipping entire build pipeline"
          echo "skip_docker_build=true" >> $GITHUB_OUTPUT
          echo "Using existing image: ghcr.io/${{ github.repository }}/budget-app:${IMAGE_TAG}"
        else
          echo "❌ Docker image not found - build pipeline required"
          echo "skip_docker_build=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Restore Go build cache
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: go-build-${{ env.GO_HASH }}
        restore-keys: |
          go-build-
    
    - name: Restore Docker buildx cache
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      id: docker_buildx_cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: docker-buildx-${{ env.DOCKER_HASH }}
        restore-keys: |
          docker-buildx-
    
    - name: Build and push Docker image
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      run: |
        echo "🐳 Building Docker image..."
        echo "Docker hash: ${{ env.DOCKER_HASH }}"
        echo "Buildx cache hit: ${{ steps.docker_buildx_cache.outputs.cache-hit }}"
        
        # Login to GitHub Container Registry
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # Build with cache using hash-based tag
        docker buildx build \
          --file Dockerfile.prod \
          --tag ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }} \
          --tag ghcr.io/${{ github.repository }}/budget-app:production \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          --push \
          .
        
        # Move cache
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        
        echo "✅ Docker image built and pushed"
        echo "Build completed with tag: ${{ env.IMAGE_TAG }}"
    
    - name: Initialize Terraform with AWS S3 backend
      id: terraform_init
      run: |
        cd terraform/environments/prod
        
        echo "🔧 Initializing Terraform with AWS S3 backend..."
        echo "Deployment ID: ${{ env.DEPLOYMENT_ID }}"
        echo "AWS Region: ${{ vars.TERRAFORM_AWS_S3_REGION }}"
        
        # Initialize with production state file
        if terraform init -backend-config="key=environments/prod/main.tfstate" -backend-config="region=${{ vars.TERRAFORM_AWS_S3_REGION }}"; then
          echo "✅ Terraform initialized successfully"
          echo "init_success=true" >> $GITHUB_OUTPUT
          
          # Check if this is a new or existing deployment
          if terraform state list | grep -q "module.app.digitalocean_app.budget_app"; then
            echo "♻️ Found existing production deployment"
            echo "is_redeployment=true" >> $GITHUB_OUTPUT
          else
            echo "🆕 New production deployment (empty state)"
            echo "is_redeployment=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "❌ Terraform initialization failed"
          echo "init_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Prepare Terraform configuration
      run: |
        cd terraform/environments/prod
        
        cat > terraform.tfvars << EOF
        do_token = "${{ env.DO_TOKEN }}"
        region = "nyc1"
        github_repo = "${{ github.repository }}"
        docker_image_tag = "${{ env.IMAGE_TAG }}"
        database_size = "db-s-1vcpu-1gb"
        instance_count = 1
        instance_size = "basic-xxs"
        health_check_initial_delay = 30
        health_check_period = 15
        health_check_timeout = 5
        health_check_failure_threshold = 3
        EOF
        
        echo "✅ Terraform configuration prepared"
    
    - name: Deploy infrastructure
      id: deploy_infra
      run: |
        cd terraform/environments/prod
        
        echo "🚀 Deploying production infrastructure..."
        
        # Check if deployment already exists in state
        RESOURCE_COUNT=$(terraform state list | wc -l)
        echo "📊 Found $RESOURCE_COUNT resources in state"
        
        if [ "$RESOURCE_COUNT" -eq 0 ]; then
          echo "🆕 New production deployment - creating all infrastructure..."
          if terraform apply -auto-approve; then
            echo "✅ New production deployment completed successfully"
            echo "deploy_success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ New production deployment failed"
            echo "deploy_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          # Existing deployment - use conditional logic based on image changes
          if [ "${{ steps.build_cache.outputs.skip_docker_build }}" = "true" ]; then
            echo "📦 Same container image - checking if infrastructure-only updates needed..."
            
            # Check what would change with a plan
            terraform plan -detailed-exitcode -out=tfplan
            plan_exit_code=$?
            
            echo "📋 Terraform plan exit code: $plan_exit_code"
            
            if [ -f tfplan ] && [ -s tfplan ]; then
              echo "📋 Plan file exists and has content - changes detected"
              echo "🔧 Infrastructure changes detected - applying updates..."
              if terraform apply -auto-approve tfplan; then
                echo "✅ Infrastructure updates applied successfully"
                echo "deploy_success=true" >> $GITHUB_OUTPUT
                echo "changes_applied=true" >> $GITHUB_OUTPUT
              else
                echo "❌ Infrastructure updates failed"
                echo "deploy_success=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            elif [ $plan_exit_code -eq 0 ]; then
              echo "✅ No changes needed - infrastructure is up to date"
              echo "deploy_success=true" >> $GITHUB_OUTPUT
              echo "changes_applied=false" >> $GITHUB_OUTPUT
            else
              echo "❌ Terraform plan failed with exit code $plan_exit_code"
              echo "deploy_success=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "🆕 New container image - updating containers..."
            if terraform apply -auto-approve; then
              echo "✅ Container updates completed successfully"
              echo "deploy_success=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Container updates failed"
              echo "deploy_success=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
        fi
        
        # Get outputs
        echo "📊 Getting deployment outputs..."
        APP_URL=$(terraform output -raw app_default_ingress 2>/dev/null || echo "")
        APP_ID=$(terraform output -raw app_id 2>/dev/null || echo "")
        MIGRATION_APP_ID=$(terraform output -raw migration_app_id 2>/dev/null || echo "")
        
        if [ -n "$APP_URL" ]; then
          echo "APP_URL=${APP_URL}" >> $GITHUB_ENV
          echo "APP_ID=${APP_ID}" >> $GITHUB_ENV
          echo "MIGRATION_APP_ID=${MIGRATION_APP_ID}" >> $GITHUB_ENV
          echo "✅ Successfully retrieved deployment outputs"
        else
          echo "⚠️ No outputs found - this may indicate an incomplete deployment"
        fi
    
    - name: Verify deployment health
      run: |
        echo "🏥 Performing production health check..."
        
        # Health check with strict requirements
        timeout 60 bash -c '
          while ! curl -f --connect-timeout 10 --max-time 15 https://budget.densestvoid.dev/health 2>/dev/null; do
            echo "Waiting for production application to be ready..."
            sleep 15
          done
        '
        
        echo "✅ Production application is ready and healthy"
    
    - name: Send success notification to Slack
      if: success()
      run: |
        echo "📢 Sending success notification to Slack..."
        
        # Create success message
        cat > slack_message.json << EOF
        {
          "text": "✅ Production Deployment Successful",
          "attachments": [
            {
              "color": "good",
              "fields": [
                {
                  "title": "Application URL",
                  "value": "https://budget.densestvoid.dev",
                  "short": true
                },
                {
                  "title": "Deployment ID",
                  "value": "${{ env.DEPLOYMENT_ID }}",
                  "short": true
                },
                {
                  "title": "Database Status",
                  "value": "Connected and healthy",
                  "short": true
                },
                {
                  "title": "Migrations",
                  "value": "Completed successfully",
                  "short": true
                },
                {
                  "title": "Commit",
                  "value": "${{ github.sha }}",
                  "short": true
                },
                {
                  "title": "Deployed By",
                  "value": "${{ github.actor }}",
                  "short": true
                }
              ]
            }
          ]
        }
        EOF
        
        # Send to Slack
        curl -X POST -H 'Content-type: application/json' \
          --data @slack_message.json \
          ${{ secrets.SLACK_WEBHOOK_PROD }}
        
        echo "✅ Success notification sent to Slack"
    
    - name: Rollback on failure
      if: failure()
      run: |
        echo "🔄 Rolling back production deployment..."
        
        cd terraform/environments/prod
        
        # Rollback database migrations using goose
        echo "🔄 Rolling back database migrations..."
        # Note: This would require access to the database and goose binary
        # For now, we'll just log the rollback attempt
        
        # Rollback app deployment
        echo "🔄 Rolling back application deployment..."
        if terraform apply -auto-approve -var="docker_image_tag=production"; then
          echo "✅ Rollback completed successfully"
        else
          echo "❌ Rollback failed - manual intervention required"
        fi
    
    - name: Send failure notification to Slack
      if: failure()
      run: |
        echo "📢 Sending failure notification to Slack..."
        
        # Create failure message
        cat > slack_message.json << EOF
        {
          "text": "❌ Production Deployment Failed",
          "attachments": [
            {
              "color": "danger",
              "fields": [
                {
                  "title": "Error Details",
                  "value": "Deployment failed during infrastructure or application deployment",
                  "short": false
                },
                {
                  "title": "Rollback Status",
                  "value": "Attempting to rollback database and application",
                  "short": true
                },
                {
                  "title": "Commit",
                  "value": "${{ github.sha }}",
                  "short": true
                },
                {
                  "title": "Deployed By",
                  "value": "${{ github.actor }}",
                  "short": true
                }
              ]
            }
          ]
        }
        EOF
        
        # Send to Slack
        curl -X POST -H 'Content-type: application/json' \
          --data @slack_message.json \
          ${{ secrets.SLACK_WEBHOOK_PROD }}
        
        echo "✅ Failure notification sent to Slack"