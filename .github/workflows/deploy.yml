name: Deploy Budget App to DigitalOcean

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true
        type: string

# Prevent concurrent deployments for the same PR (manual and automatic)
# Don't cancel running workflows to avoid partial Terraform deployments
concurrency:
  group: deploy-pr-${{ github.event.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  go-checks:
    uses: densestvoid/workflows/.github/workflows/go-checks.yml@main

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: go-checks
    
    permissions:
      contents: read
      packages: write
      pull-requests: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate deployment ID
      id: deployment_id
      run: |
        # Handle both PR events and manual dispatch
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          PR_NUMBER="${{ github.event.number }}"
        else
          # Manual dispatch
          PR_NUMBER="${{ github.event.inputs.pr_number }}"
        fi
        
        # Simple naming: just pr-{number}
        DEPLOYMENT_ID="pr-${PR_NUMBER}"
        
        echo "Event type: ${{ github.event_name }}"
        echo "PR number: ${PR_NUMBER}"
        echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> $GITHUB_ENV
        echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
        echo "Deployment ID: ${DEPLOYMENT_ID}"
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7
    
    - name: Initialize Terraform with AWS S3 backend
      id: terraform_init
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
        AWS_REGION: ${{ secrets.TERRAFORM_AWS_S3_REGION }}
      run: |
        cd terraform
        
        echo "🔧 Initializing Terraform with AWS S3 backend..."
        echo "Deployment ID: ${{ env.DEPLOYMENT_ID }}"
        
        # Set AWS region from secret
        AWS_REGION="${{ secrets.TERRAFORM_AWS_S3_REGION }}"
        echo "AWS Region: '$AWS_REGION'"
        
        # Initialize with deployment-specific state file
        if terraform init -backend-config="key=pr/${{ env.DEPLOYMENT_ID }}.tfstate" -backend-config="region=$AWS_REGION"; then
          echo "✅ Terraform initialized successfully"
          echo "init_success=true" >> $GITHUB_OUTPUT
          
          # Check if this is a new or existing deployment
          if terraform state list | grep -q "digitalocean_app.budget_app"; then
            echo "♻️ Found existing deployment state"
            echo "is_redeployment=true" >> $GITHUB_OUTPUT
            
            # Show current state
            echo "📋 Current resources in state:"
            terraform state list
          else
            echo "🆕 New deployment (empty state)"
            echo "is_redeployment=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "❌ Terraform initialization failed"
          echo "init_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Check build requirements and caches
      id: build_cache
      run: |
        echo "🔍 Analyzing build requirements..."
        
        # Generate cache keys
        GO_HASH=$(find . -name "*.go" -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
        DOCKER_HASH=$(find . -name "Dockerfile*" -o -name "*.go" -o -name "go.mod" -o -name "go.sum" | sort | xargs md5sum | md5sum | cut -d' ' -f1)
        
        echo "GO_HASH=${GO_HASH}" >> $GITHUB_ENV
        echo "DOCKER_HASH=${DOCKER_HASH}" >> $GITHUB_ENV
        
        # Generate image tag
        IMAGE_TAG="pr-${{ github.event.number }}-${{ github.sha }}"
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        
        echo "📦 Image tag: ${IMAGE_TAG}"
        echo "🔑 Go cache key: ${GO_HASH}"
        echo "🔑 Docker cache key: ${DOCKER_HASH}"
        
        # Check if Docker image already exists
        if docker manifest inspect ghcr.io/${{ github.repository }}/budget-app:${IMAGE_TAG} >/dev/null 2>&1; then
          echo "✅ Docker image exists - skipping entire build pipeline"
          echo "skip_docker_build=true" >> $GITHUB_OUTPUT
          echo "Using existing image: ghcr.io/${{ github.repository }}/budget-app:${IMAGE_TAG}"
        else
          echo "❌ Docker image not found - build pipeline required"
          echo "skip_docker_build=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Restore Go build cache
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
        key: go-build-${{ env.GO_HASH }}
        restore-keys: |
          go-build-
    
    - name: Restore Docker buildx cache
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      id: docker_buildx_cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: docker-buildx-${{ env.DOCKER_HASH }}
        restore-keys: |
          docker-buildx-
    
    - name: Build and push Docker image
      if: steps.build_cache.outputs.skip_docker_build == 'false'
      run: |
        echo "🐳 Building Docker image..."
        echo "Buildx cache hit: ${{ steps.docker_buildx_cache.outputs.cache-hit }}"
        
        # Login to GitHub Container Registry
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # Build and push with buildx
        docker buildx build \
          --platform linux/amd64 \
          --tag ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }} \
          --tag ghcr.io/${{ github.repository }}/budget-app:${{ env.DEPLOYMENT_ID }} \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          --push \
          .
        
        # Update cache
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        
        echo "✅ Docker image built and pushed"
    
    - name: Prepare Terraform configuration
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        do_token = "${{ env.DO_TOKEN }}"
        region = "nyc1"
        deployment_id = "${{ env.DEPLOYMENT_ID }}"
        github_repo = "${{ github.repository }}"
        docker_image_tag = "${{ env.IMAGE_TAG }}"
        EOF
        
        echo "✅ Terraform configuration prepared"
    
    # Terraform workspace automatically handles existing vs new deployments
    
    - name: Import existing resources
      id: import_existing
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
        AWS_REGION: ${{ secrets.TERRAFORM_AWS_S3_REGION }}
      run: |
        cd terraform
        
        echo "🔍 Checking for existing resources to import..."
        
        # Check if VPC with same name exists
        VPC_NAME="${{ env.DEPLOYMENT_ID }}"
        echo "Checking for existing VPC: $VPC_NAME"
        
        # Use DigitalOcean API to check if VPC exists
        VPC_ID=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/vpcs" | \
          jq -r ".vpcs[] | select(.name == \"$VPC_NAME\") | .id" || echo "")
        
        if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "" ]; then
          echo "📥 Found existing VPC: $VPC_NAME (ID: $VPC_ID) - importing..."
          
          # Import the existing VPC into Terraform state
          if terraform import digitalocean_vpc.budget_vpc "$VPC_ID"; then
            echo "✅ VPC imported successfully"
          else
            echo "⚠️ Failed to import VPC - will be managed as new resource"
          fi
        else
          echo "✅ No existing VPC found - will create new"
        fi
        
        # Check for existing apps with same name
        APP_NAME="${{ env.DEPLOYMENT_ID }}"
        MIGRATION_APP_NAME="${{ env.DEPLOYMENT_ID }}-migrations"
        
        echo "Checking for existing apps: $APP_NAME, $MIGRATION_APP_NAME"
        
        # Check for main app
        APP_ID=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/apps" | \
          jq -r ".apps[] | select(.spec.name == \"$APP_NAME\") | .id" || echo "")
        
        if [ -n "$APP_ID" ] && [ "$APP_ID" != "" ]; then
          echo "📥 Found existing app: $APP_NAME (ID: $APP_ID) - importing..."
          
          if terraform import digitalocean_app.budget_app "$APP_ID"; then
            echo "✅ App imported successfully"
          else
            echo "⚠️ Failed to import app - will be managed as new resource"
          fi
        else
          echo "✅ No existing app found - will create new"
        fi
        
        # Check for migration app
        MIGRATION_APP_ID=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/apps" | \
          jq -r ".apps[] | select(.spec.name == \"$MIGRATION_APP_NAME\") | .id" || echo "")
        
        if [ -n "$MIGRATION_APP_ID" ] && [ "$MIGRATION_APP_ID" != "" ]; then
          echo "📥 Found existing migration app: $MIGRATION_APP_NAME (ID: $MIGRATION_APP_ID) - importing..."
          
          if terraform import digitalocean_app.budget_migrations "$MIGRATION_APP_ID"; then
            echo "✅ Migration app imported successfully"
          else
            echo "⚠️ Failed to import migration app - will be managed as new resource"
          fi
        else
          echo "✅ No existing migration app found - will create new"
        fi
        
        # Check for existing database cluster
        DB_NAME="${{ env.DEPLOYMENT_ID }}"
        echo "Checking for existing database cluster: $DB_NAME"
        
        # Use DigitalOcean API to check if database cluster exists
        DB_ID=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/databases" | \
          jq -r ".databases[] | select(.name == \"$DB_NAME\") | .id" || echo "")
        
        if [ -n "$DB_ID" ] && [ "$DB_ID" != "" ]; then
          echo "📥 Found existing database cluster: $DB_NAME (ID: $DB_ID) - importing..."
          
          if terraform import digitalocean_database_cluster.budget_db "$DB_ID"; then
            echo "✅ Database cluster imported successfully"
          else
            echo "⚠️ Failed to import database cluster - will be managed as new resource"
          fi
        else
          echo "✅ No existing database cluster found - will create new"
        fi
        
        # Check for existing database within the cluster
        if [ -n "$DB_ID" ] && [ "$DB_ID" != "" ]; then
          echo "Checking for existing database within cluster..."
          
          # Get database name from cluster
          DB_DB_NAME=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/databases/$DB_ID/dbs" | \
            jq -r ".dbs[] | select(.name == \"$DB_NAME\") | .name" || echo "")
          
          if [ -n "$DB_DB_NAME" ] && [ "$DB_DB_NAME" != "" ]; then
            echo "📥 Found existing database: $DB_DB_NAME - importing..."
            
            if terraform import digitalocean_database_db.budget_database "$DB_ID/$DB_DB_NAME"; then
              echo "✅ Database imported successfully"
            else
              echo "⚠️ Failed to import database - will be managed as new resource"
            fi
          else
            echo "✅ No existing database found - will create new"
          fi
          
          # Check for existing database user
          DB_USER_NAME=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/databases/$DB_ID/users" | \
            jq -r ".users[] | select(.name == \"$DB_NAME\") | .name" || echo "")
          
          if [ -n "$DB_USER_NAME" ] && [ "$DB_USER_NAME" != "" ]; then
            echo "📥 Found existing database user: $DB_USER_NAME - importing..."
            
            if terraform import digitalocean_database_user.budget_user "$DB_ID/$DB_USER_NAME"; then
              echo "✅ Database user imported successfully"
            else
              echo "⚠️ Failed to import database user - will be managed as new resource"
            fi
          else
            echo "✅ No existing database user found - will create new"
          fi
        fi
        
        # Check for existing project resources assignment
        echo "Checking for existing project resources assignment..."
        
        # Get project resources to see if any are already assigned
        PROJECT_ID="889f3e33-7221-47a7-b65f-8a429c882af0"
        EXISTING_RESOURCES=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/projects/$PROJECT_ID/resources" | \
          jq -r '.resources[] | select(.urn | contains("do:app:") or contains("do:dbaas:")) | .urn' || echo "")
        
        if [ -n "$EXISTING_RESOURCES" ] && [ "$EXISTING_RESOURCES" != "" ]; then
          echo "📥 Found existing project resources - attempting to import..."
          
          # Try to import project resources (this might fail if already managed elsewhere)
          if terraform import digitalocean_project_resources.budget_resources "$PROJECT_ID"; then
            echo "✅ Project resources imported successfully"
          else
            echo "⚠️ Failed to import project resources - may already be managed elsewhere"
          fi
        else
          echo "✅ No conflicting project resources found"
        fi
        
        # Check for existing domains (if domain_name is set)
        if [ -n "${{ vars.DOMAIN_NAME }}" ] && [ "${{ vars.DOMAIN_NAME }}" != "" ]; then
          echo "Checking for existing domain: ${{ vars.DOMAIN_NAME }}"
          
          DOMAIN_NAME="${{ vars.DOMAIN_NAME }}"
          DOMAIN_EXISTS=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/domains" | \
            jq -r ".domains[] | select(.name == \"$DOMAIN_NAME\") | .name" || echo "")
          
          if [ -n "$DOMAIN_EXISTS" ] && [ "$DOMAIN_EXISTS" != "" ]; then
            echo "📥 Found existing domain: $DOMAIN_NAME - importing..."
            
            if terraform import digitalocean_domain.budget_domain[0] "$DOMAIN_NAME"; then
              echo "✅ Domain imported successfully"
            else
              echo "⚠️ Failed to import domain - will be managed as new resource"
            fi
          else
            echo "✅ No existing domain found - will create new"
          fi
        else
          echo "ℹ️ No domain configured - skipping domain import"
        fi
        
        # Check for existing DNS records (if domain exists)
        if [ -n "${{ vars.DOMAIN_NAME }}" ] && [ "${{ vars.DOMAIN_NAME }}" != "" ]; then
          echo "Checking for existing DNS records..."
          
          DOMAIN_NAME="${{ vars.DOMAIN_NAME }}"
          RECORD_EXISTS=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/domains/$DOMAIN_NAME/records" | \
            jq -r '.domain_records[] | select(.type == "CNAME" and .name == "@") | .id' || echo "")
          
          if [ -n "$RECORD_EXISTS" ] && [ "$RECORD_EXISTS" != "" ]; then
            echo "📥 Found existing DNS record - importing..."
            
            if terraform import digitalocean_record.budget_a_record[0] "$DOMAIN_NAME,$RECORD_EXISTS"; then
              echo "✅ DNS record imported successfully"
            else
              echo "⚠️ Failed to import DNS record - will be managed as new resource"
            fi
          else
            echo "✅ No existing DNS record found - will create new"
          fi
        fi
        
        # Check for existing null resources (these are harder to detect, so we'll skip them)
        echo "ℹ️ Skipping null_resource imports (database_health_check, database_schema_setup) - these will be recreated if needed"
        
        echo "✅ Resource import check completed"

    - name: Deploy infrastructure
      id: deploy
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
        AWS_REGION: ${{ secrets.TERRAFORM_AWS_S3_REGION }}
      run: |
        cd terraform
        
        echo "🚀 Deploying infrastructure..."
            
            # Check if this is a new deployment
            if [ "${{ steps.terraform_init.outputs.is_redeployment }}" = "false" ]; then
              echo "🆕 New deployment - creating all resources..."
              
              if terraform apply -auto-approve; then
                echo "✅ New deployment successful"
                echo "deployment_success=true" >> $GITHUB_OUTPUT
              else
                echo "❌ New deployment failed"
                echo "deployment_success=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            else
              # Existing deployment - use conditional logic based on image changes
              if [ "${{ steps.build_cache.outputs.skip_docker_build }}" = "true" ]; then
                echo "📦 Same container image - checking if infrastructure-only updates needed..."
                
                # Check what would change with a plan
                terraform plan -detailed-exitcode -out=tfplan
                plan_exit_code=$?
                
                echo "📋 Terraform plan exit code: $plan_exit_code"
                
                if [ $plan_exit_code -eq 2 ]; then
                  echo "🔄 Infrastructure changes detected - applying updates..."
                  
                  if [ -f tfplan ] && [ -s tfplan ]; then
                    echo "📋 Plan file exists and has content - changes detected"
                    echo "🔧 Infrastructure changes detected - applying updates..."
                    
                    if terraform apply -auto-approve tfplan; then
                      echo "✅ Infrastructure updates successful"
                      echo "deployment_success=true" >> $GITHUB_OUTPUT
                    else
                      echo "❌ Infrastructure updates failed"
                      echo "deployment_success=false" >> $GITHUB_OUTPUT
                      exit 1
                    fi
                  else
                    echo "❌ Plan file missing or empty"
                    echo "deployment_success=false" >> $GITHUB_OUTPUT
                    exit 1
                  fi
                elif [ $plan_exit_code -eq 0 ]; then
                  echo "✅ No changes needed - infrastructure is up to date"
                  echo "deployment_success=true" >> $GITHUB_OUTPUT
                else
                  echo "❌ Terraform plan failed"
                  echo "deployment_success=false" >> $GITHUB_OUTPUT
                  exit 1
                fi
              else
                echo "🔄 New container image - updating containers..."
                
                if terraform apply -auto-approve; then
                  echo "✅ Container update successful"
                  echo "deployment_success=true" >> $GITHUB_OUTPUT
                else
                  echo "❌ Container update failed"
                  echo "deployment_success=false" >> $GITHUB_OUTPUT
                  exit 1
                fi
              fi
            fi
            
            # Get outputs
            echo "📊 Getting deployment outputs..."
            
            # Get outputs
            APP_URL=$(terraform output -raw app_default_ingress 2>/dev/null || echo "")
            APP_ID=$(terraform output -raw app_id 2>/dev/null || echo "")
            MIGRATION_APP_ID=$(terraform output -raw migration_app_id 2>/dev/null || echo "")
            
            if [ -n "$APP_URL" ] && [ "$APP_URL" != "" ]; then
              echo "APP_URL=${APP_URL}" >> $GITHUB_ENV
              echo "APP_ID=${APP_ID}" >> $GITHUB_ENV
              echo "MIGRATION_APP_ID=${MIGRATION_APP_ID}" >> $GITHUB_ENV
              echo "✅ Successfully retrieved deployment outputs"
            else
              echo "⚠️ No outputs found - this may indicate an incomplete deployment"
            fi
    
    # Database readiness, migrations, and app deployment all handled by Terraform
    
    - name: Verify deployment health
      run: |
        echo "🏥 Verifying deployment health..."
        
        if [ -n "${{ env.APP_URL }}" ]; then
          echo "🌐 Application URL: ${{ env.APP_URL }}"
          
          # Wait for application to be ready
          echo "⏳ Waiting for application to be ready..."
          sleep 30
          
          # Check if application is responding
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.APP_URL }}/health" || echo "000")
          echo "🏥 Health check response: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Application is healthy and responding"
          else
            echo "⚠️ Application health check returned: $HTTP_CODE"
            echo "This may be normal if the health endpoint is not implemented"
          fi
        else
          echo "⚠️ No application URL available for health check"
        fi
    
    - name: Set up auto-termination
      if: success()
      run: |
        echo "⏰ Setting up auto-termination..."
        
        # Calculate termination time (30 minutes from now)
        TERMINATION_TIME=$(date -d '+30 minutes' -u +'%Y-%m-%dT%H:%M:%SZ')
        echo "TERMINATION_TIME=${TERMINATION_TIME}" >> $GITHUB_ENV
        
        echo "🕐 Deployment will auto-terminate at: ${TERMINATION_TIME}"
        echo "⏰ Auto-termination configured for 30 minutes"
    
    - name: Comment on PR with success
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const message = [
            '## ✅ Deployment Successful',
            '',
            '🌐 **URL:** ${{ env.APP_URL }}',
            '🆔 **App ID:** ${{ env.APP_ID }}',
            '🔧 **Migration ID:** ${{ env.MIGRATION_APP_ID }}',
            '📦 **Deployment:** ${{ env.DEPLOYMENT_ID }}',
            '⏰ **Terminates:** ${{ env.TERMINATION_TIME }}'
          ].join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Send success notification to Slack
      if: success()
      run: |
        echo "📢 Sending success notification to Slack..."
        
        # Create success message
        cat > slack_message.json << EOF
        {
          "text": "✅ PR Deployment Successful",
          "attachments": [
            {
              "color": "good",
              "fields": [
                {
                  "title": "Application URL",
                  "value": "${{ env.APP_URL }}",
                  "short": true
                },
                {
                  "title": "PR Number",
                  "value": "${{ github.event.number }}",
                  "short": true
                },
                {
                  "title": "Deployment ID",
                  "value": "${{ env.DEPLOYMENT_ID }}",
                  "short": true
                },
                {
                  "title": "Auto-terminates",
                  "value": "30 minutes",
                  "short": true
                }
              ]
            }
          ]
        }
        EOF
        
        # Send to Slack
        curl -X POST -H 'Content-type: application/json' \
          --data @slack_message.json \
          ${{ secrets.SLACK_WEBHOOK_PR }}
        
        echo "✅ Success notification sent to Slack"
    
    - name: Comment on PR with failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const workflow = 'Deploy Budget App';
          let failedStep = 'Unknown';
          let errorMessage = 'Workflow execution failed';

          // Determine the failed step based on the workflow context
          if (context.payload.workflow_run && context.payload.workflow_run.conclusion === 'failure') {
            failedStep = 'Deploy infrastructure (Database → Migration → Application)';
            errorMessage = 'Terraform deployment failed. This could be:\\n' +
                          '• Database cluster creation failure\\n' +
                          '• Migration container failure (check migration logs in DigitalOcean App Platform)\\n' +
                          '• Application container deployment failure\\n' +
                          '• Database firewall configuration failure\\n' +
                          'Check GitHub Actions logs and DigitalOcean App Platform console for detailed error output.';
          } else {
            failedStep = 'Post-deployment verification';
            errorMessage = 'Infrastructure deployed but post-deployment steps failed. Check application health and auto-termination setup.';
          }
          
          const message = [
            '## ❌ Deployment Failed',
            '',
            `**Workflow:** ${workflow}`,
            `**Step:** ${failedStep}`,
            '**Error:**',
            '```',
            errorMessage,
            '```',
            '**Cleanup:** Partial deployment cleaned up automatically'
          ].join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Send failure notification to Slack
      if: failure()
      run: |
        echo "📢 Sending failure notification to Slack..."
        
        # Create failure message
        cat > slack_message.json << EOF
        {
          "text": "❌ PR Deployment Failed",
          "attachments": [
            {
              "color": "danger",
              "fields": [
                {
                  "title": "PR Number",
                  "value": "${{ github.event.number }}",
                  "short": true
                },
                {
                  "title": "Deployment ID",
                  "value": "${{ env.DEPLOYMENT_ID }}",
                  "short": true
                },
                {
                  "title": "Error Details",
                  "value": "Deployment failed during infrastructure or application deployment",
                  "short": false
                },
                {
                  "title": "Cleanup Status",
                  "value": "Partial deployment cleaned up automatically",
                  "short": true
                }
              ]
            }
          ]
        }
        EOF
        
        # Send to Slack
        curl -X POST -H 'Content-type: application/json' \
          --data @slack_message.json \
          ${{ secrets.SLACK_WEBHOOK_PR }}
        
        echo "✅ Failure notification sent to Slack"
    
    - name: Cleanup on failure
      if: failure()
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
        AWS_REGION: ${{ secrets.TERRAFORM_AWS_S3_REGION }}
      run: |
        echo "🧹 Cleaning up failed deployment..."
        
        cd terraform
        
        if [ -f terraform.tfvars ]; then
          echo "🗑️ Destroying failed deployment resources..."
          
          # Initialize Terraform to access state
          if terraform init -backend-config="key=pr/${{ env.DEPLOYMENT_ID }}.tfstate" -backend-config="region=${{ secrets.TERRAFORM_AWS_S3_REGION }}"; then
            echo "✅ Terraform initialized for cleanup"
            
            # Check if there are any resources to destroy
            if terraform state list | grep -q .; then
              echo "🗑️ Found resources in state - destroying..."
              
              if terraform destroy -auto-approve; then
                echo "✅ Cleanup completed successfully"
                
                # Remove state file from S3 after successful destroy
                echo "🗑️ Removing state file from S3..."
                if aws s3 rm "s3://densestvoid-terraform/pr/${{ env.DEPLOYMENT_ID }}.tfstate"; then
                  echo "✅ State file removed from S3"
                else
                  echo "⚠️ Failed to remove state file from S3"
                fi
              else
                echo "⚠️ Cleanup failed - manual intervention may be required"
              fi
            else
              echo "ℹ️ No resources found in state - nothing to clean up"
            fi
          else
            echo "❌ Failed to initialize Terraform for cleanup"
            echo "⚠️ Manual cleanup may be required for deployment: ${{ env.DEPLOYMENT_ID }}"
          fi
        else
          echo "ℹ️ No terraform.tfvars found - skipping cleanup"
        fi