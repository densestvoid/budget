name: Deploy Budget App to DigitalOcean

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true
        type: string

# Prevent concurrent deployments for the same PR (manual and automatic)
# Don't cancel running workflows to avoid partial Terraform deployments
concurrency:
  group: deploy-pr-${{ github.event.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  go-checks:
    uses: densestvoid/workflows/.github/workflows/go-checks.yml@main

  deploy:
    name: Deploy to DigitalOcean
    needs: go-checks
    permissions:
      contents: read
      packages: write
      pull-requests: write
      actions: write
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: pr
      deployment_id: pr-${{ github.event.number || github.event.inputs.pr_number }}
      terraform_dir: terraform/pr
      backend_key: pr/pr-${{ github.event.number || github.event.inputs.pr_number }}.tfstate
      image_tag: pr-${{ github.event.number || github.event.inputs.pr_number }}-${{ github.sha }}
      slack_webhook_secret_name: SLACK_WEBHOOK_PR
      vpc_name: pr-${{ github.event.number || github.event.inputs.pr_number }}
      app_name: pr-${{ github.event.number || github.event.inputs.pr_number }}
      migration_app_name: pr-${{ github.event.number || github.event.inputs.pr_number }}-migrations
      db_name: pr-${{ github.event.number || github.event.inputs.pr_number }}
      project_name: budget-develop
      post_pr_comments: true
      setup_auto_termination: true
      pr_number: ${{ github.event.number || github.event.inputs.pr_number }}
    secrets:
      DO_TOKEN: ${{ secrets.DO_TOKEN }}
      TERRAFORM_AWS_S3_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY }}
      TERRAFORM_AWS_S3_ACCESS_KEY_SECRET: ${{ secrets.TERRAFORM_AWS_S3_ACCESS_KEY_SECRET }}
      TERRAFORM_AWS_S3_REGION: ${{ secrets.TERRAFORM_AWS_S3_REGION }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_PR }}
