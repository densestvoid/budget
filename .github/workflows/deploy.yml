name: Deploy Budget App to DigitalOcean App Platform

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']  # Trigger for PRs targeting any branch

env:
  # DigitalOcean configuration
  DO_TOKEN: ${{ secrets.DO_TOKEN }}
  
  # Deployment configuration
  DEPLOYMENT_TIMEOUT: 30  # minutes

jobs:
  deploy:
    name: Deploy to DigitalOcean App Platform
    runs-on: ubuntu-latest
    
    # Only run on PR events to save costs
    if: github.event_name == 'pull_request'
    
    # Permissions needed for GitHub Container Registry and workflow dispatch
    permissions:
      contents: read
      packages: write
      pull-requests: write  # For PR comments
      actions: write        # For triggering workflow_dispatch
    
    # Outputs for the termination job
    outputs:
      app_id: ${{ env.APP_ID }}
      app_url: ${{ env.APP_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Generate unique deployment identifiers
      run: |
        # Create unique identifiers for this deployment
        PR_NUMBER="${{ github.event.number }}"
        BRANCH_NAME=$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
        COMMIT_SHORT=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-8)
        
        DEPLOYMENT_NAME="budget-pr-${PR_NUMBER}-${BRANCH_NAME}-${COMMIT_SHORT}"
        IMAGE_TAG="${COMMIT_SHORT}"
        
        echo "DEPLOYMENT_NAME=${DEPLOYMENT_NAME}" >> $GITHUB_ENV
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        echo "Deployment name: ${DEPLOYMENT_NAME}"
        echo "Image tag: ${IMAGE_TAG}"
    
    - name: Build and push Docker image
      run: |
        echo "Building Docker image and pushing to GitHub Container Registry..."
        
        # Login to GitHub Container Registry
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # Build the Docker image with specific tag
        docker build -f Dockerfile.prod -t ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }} .
        docker build -f Dockerfile.prod -t ghcr.io/${{ github.repository }}/budget-app:latest .
        
        # Push both versions
        docker push ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }}
        docker push ghcr.io/${{ github.repository }}/budget-app:latest
        
        echo "✅ Docker image pushed successfully"
        echo "IMAGE_URL=ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
    
    - name: Create Terraform variables file
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        # DigitalOcean Configuration
        do_token = "${{ secrets.DO_TOKEN }}"
        
        # Cost-optimized configuration
        region = "nyc1"
        
        # Application Configuration
        app_port = "8080"
        app_env = "production"
        log_level = "info"
        
        # Auto-termination
        auto_terminate_minutes = 30
        
        # GitHub Integration
        github_repo = "${{ github.repository }}"
        github_branch = "${{ github.head_ref }}"
        docker_image_tag = "${{ env.IMAGE_TAG }}"
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        EOF
    
    - name: Initialize Terraform
      run: |
        cd terraform
        terraform init
    
    - name: Plan Terraform deployment
      run: |
        cd terraform
        terraform plan -out=tfplan
    
    - name: Apply Terraform deployment
      run: |
        cd terraform
        terraform apply -auto-approve tfplan
        
        # Get deployment outputs
        APP_URL=$(terraform output -raw app_url)
        APP_ID=$(terraform output -raw app_id)
        COST=$(terraform output -raw estimated_monthly_cost)
        TERMINATION_INFO=$(terraform output -raw auto_termination_info)
        
        echo "APP_URL=${APP_URL}" >> $GITHUB_ENV
        echo "APP_ID=${APP_ID}" >> $GITHUB_ENV
        echo "ESTIMATED_COST=${COST}" >> $GITHUB_ENV
        echo "TERMINATION_INFO=${TERMINATION_INFO}" >> $GITHUB_ENV
        
        # Get termination method info
        TERMINATION_METHOD=$(terraform output -json termination_method)
        CLEANUP_METHOD=$(echo "$TERMINATION_METHOD" | jq -r '.method')
        DELAY_MINUTES=$(echo "$TERMINATION_METHOD" | jq -r '.delay_minutes')
        
        echo "CLEANUP_METHOD=${CLEANUP_METHOD}" >> $GITHUB_ENV
        echo "DELAY_MINUTES=${DELAY_MINUTES}" >> $GITHUB_ENV
        
        echo "✅ App Platform deployment initiated!"
        echo "🌐 Application URL: ${APP_URL}"
        echo "🆔 App ID: ${APP_ID}"
        echo "💰 Estimated cost: ${COST}"
        echo "⏰ Auto-termination: ${DELAY_MINUTES} minutes via environment wait timer"
        echo "🔄 Method: ${CLEANUP_METHOD}"
    
    # No state storage needed - auto-terminate workflow will import resources directly from DigitalOcean
    
    - name: Wait for App Platform deployment
      run: |
        echo "Waiting for DigitalOcean App Platform deployment..."
        echo "This typically takes 2-5 minutes for container deployment"
        
        # Wait for the application to be accessible
        timeout 600 bash -c '
          attempt=1
          while ! curl -f --connect-timeout 10 ${{ env.APP_URL }}/health 2>/dev/null; do
            echo "Waiting for App Platform deployment (attempt $attempt)..."
            
            # Show progress every 5 attempts
            if [ $((attempt % 5)) -eq 0 ]; then
              echo "--- Deployment Progress Check (attempt $attempt) ---"
              echo "App URL: ${{ env.APP_URL }}"
              echo "Testing connectivity..."
              curl -I --connect-timeout 5 ${{ env.APP_URL }}/ 2>/dev/null || echo "No response yet"
            fi
            
            attempt=$((attempt + 1))
            sleep 20
          done
        '
        
        echo "✅ Application is now accessible!"
    
    - name: Verify App Platform deployment
      run: |
        echo "Verifying App Platform deployment..."
        
        # Test health endpoint
        if curl -f ${{ env.APP_URL }}/health; then
          echo "✅ Health check passed!"
          
          # Get health response
          echo "Health response:"
          curl -s ${{ env.APP_URL }}/health | jq '.' 2>/dev/null || curl -s ${{ env.APP_URL }}/health
          
          echo "✅ Deployment verification successful!"
          echo "🚀 Application is running at: ${{ env.APP_URL }}"
        else
          echo "❌ Health check failed"
          exit 1
        fi
    
    - name: Schedule auto-termination
      run: |
        echo "Scheduling auto-termination via GitHub Actions..."
        
        # We'll use GitHub's workflow dispatch to schedule termination
        # Create a delay and then call DigitalOcean API to delete the app
        
        # For now, just log the termination info
        echo "🕐 Auto-termination scheduled for ${{ env.TERMINATION_INFO }}"
        echo "📍 App ID: ${{ env.APP_ID }}"
        echo "🌐 App URL: ${{ env.APP_URL }}"
        
        # Note: In a production setup, you'd use GitHub's scheduled workflows
        # or a separate termination service
    
    - name: Update deployment status
      run: |
        echo "## 🚀 App Platform Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**PR:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.event.pull_request.head.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Application URL:** ${{ env.APP_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "**App ID:** ${{ env.APP_ID }}" >> $GITHUB_STEP_SUMMARY
        echo "**Estimated Cost:** ${{ env.ESTIMATED_COST }}" >> $GITHUB_STEP_SUMMARY
        echo "**Auto-termination:** ${{ env.TERMINATION_INFO }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **Note:** Failed deployments are preserved for debugging. Successful deployments auto-terminate." >> $GITHUB_STEP_SUMMARY
    
    - name: Provide debugging info on failure
      if: failure()
      run: |
        echo "❌ App Platform deployment failed!"
        echo ""
        echo "🔍 DEBUGGING INFORMATION:"
        if [ -n "${{ env.APP_URL }}" ]; then
          echo "App URL: ${{ env.APP_URL }}"
          echo "App ID: ${{ env.APP_ID }}"
          echo "You can check the app status in DigitalOcean App Platform console"
        else
          echo "App was not created - check Terraform logs above"
        fi
        echo ""
        echo "🏗️ The app will be PRESERVED for debugging if it was created"
        echo "⚠️ Remember to manually destroy the app when done debugging to avoid charges:"
        echo "cd terraform && terraform destroy -auto-approve"

    - name: Comment on PR with deployment info
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🚀 App Platform Deployment Successful!
            
            Your PR has been deployed to DigitalOcean App Platform:
            
            **🌐 Application URL:** ${{ env.APP_URL }}
            **🆔 App ID:** ${{ env.APP_ID }}
            **💰 Estimated Cost:** ${{ env.ESTIMATED_COST }}
            **⏰ Auto-Termination:** ${{ env.DELAY_MINUTES }} minutes
            **🔄 Method:** ${{ env.CLEANUP_METHOD }}
            **⚡ Zero Runner Waste:** Environment wait timer handles delay
            **🗃️ Database:** PostgreSQL (internal service in App Platform)
            **💻 Instance:** basic-xxs (0.5 vCPU, 512MB RAM)
            
            **PR Details:**
            - **Branch:** ${{ github.head_ref }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            - **Image:** ghcr.io/${{ github.repository }}/budget-app:${{ env.IMAGE_TAG }}
            
            **Benefits of App Platform:**
            - ✅ Automatic HTTPS/SSL
            - ✅ Built-in load balancing  
            - ✅ Automatic scaling
            - ✅ Managed container orchestration
            - ✅ No server management needed
            
            **Auto-Termination:**
            - 🕐 Scheduled via workflow_dispatch (30 minutes)
            - ⚡ No GitHub runner time wasted during delay
            - 🔄 Uses environment wait timer for precise timing
            - 📥 Imports resources directly from DigitalOcean (no state sharing needed)
            
            **Setup Required (First Time Only):**
            1. Create \`termination-delay\` environment with 30-minute wait timer
            2. Manually trigger auto-terminate workflow once to register it
            
            **How it works:**
            - Triggers auto-terminate workflow via API
            - Environment wait timer delays execution (no runner cost)
            - Workflow imports resources and runs terraform destroy
            
            Test your changes and provide feedback! 🎉`
          })
    
    - name: Comment on PR if deployment failed
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ❌ App Platform Deployment Failed
            
            The App Platform deployment for this PR failed. Please check the [GitHub Actions logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            
            **Common issues:**
            - Missing repository secrets (DO_TOKEN)
            - DigitalOcean App Platform quota exceeded
            - Container image build or registry issues
            - Invalid App Platform configuration
            
            **Debugging:**
            - Check the Terraform logs in GitHub Actions
            - Verify the Docker image was pushed successfully
            - Check DigitalOcean App Platform console for app status
            
            Please fix the issues and push a new commit to retry the deployment.`
          })

    - name: Schedule auto-termination via workflow dispatch
      if: success()
      run: |
        echo "🕐 Scheduling auto-termination via workflow dispatch..."
        
        # Trigger the auto-termination workflow
        echo "Triggering auto-termination workflow..."
        
        response=$(curl -w "%{http_code}" -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-terminate.yml/dispatches" \
          -d "{
            \"ref\": \"${{ github.head_ref }}\",
            \"inputs\": {
              \"app_id\": \"${{ env.APP_ID }}\",
              \"app_url\": \"${{ env.APP_URL }}\",
              \"pr_number\": \"${{ github.event.number }}\"
            }
          }")
        
        http_code="${response: -3}"
        response_body="${response%???}"
        
        if [ "$http_code" = "204" ]; then
          echo "✅ Auto-termination workflow dispatched successfully"
          echo "🕐 Environment wait timer will delay execution by 30 minutes"
          echo "⚡ No GitHub runner time wasted during delay!"
          echo "🔄 Workflow will start automatically after environment approval"
        else
          echo "❌ Failed to dispatch auto-termination workflow (HTTP: $http_code)"
          echo "Response: $response_body"
          echo ""
          echo "💡 If this is the first time, manually trigger the auto-terminate workflow once to register it:"
          echo "   Go to Actions → Auto-Terminate Deployment → Run workflow"
          echo "   Then future automatic triggers will work"
          echo ""
          echo "⚠️  For now, manual cleanup required:"
          echo "cd terraform && terraform destroy -auto-approve"
        fi