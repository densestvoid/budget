name: Deploy Budget App to DigitalOcean

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      packages: write
      pull-requests: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate deployment ID
      id: deployment_id
      run: |
        # Create deployment ID: pr-{number}-{branch}
        PR_NUMBER="${{ github.event.number }}"
        BRANCH_NAME="${{ github.head_ref }}"
        DEPLOYMENT_ID="pr-${PR_NUMBER}-${BRANCH_NAME}"
        
        echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> $GITHUB_ENV
        echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
        echo "Deployment ID: ${DEPLOYMENT_ID}"
    
    - name: Ensure shared DigitalOcean project exists
      id: ensure_project
      run: |
        echo "🏗️ Ensuring shared project 'budget-develop' exists..."
        
        # Check if project exists
        project_response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/projects")
        
        if echo "$project_response" | jq -e '.projects[] | select(.name == "budget-develop")' >/dev/null; then
          echo "✅ Project 'budget-develop' already exists"
          echo "project_exists=true" >> $GITHUB_OUTPUT
        else
          echo "📝 Creating shared project 'budget-develop'..."
          
          create_response=$(curl -w "%{http_code}" -s -X POST \
            -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/projects" \
            -d '{
              "name": "budget-develop",
              "description": "Shared project for Budget App PR deployments", 
              "purpose": "Web Application",
              "environment": "Development"
            }')
          
          http_code="${create_response: -3}"
          if [ "$http_code" = "201" ]; then
            echo "✅ Project 'budget-develop' created successfully"
            echo "project_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to create project (HTTP: $http_code)"
            echo "Response: ${create_response%???}"
            echo "project_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        fi
    
    - name: Check for existing deployment
      id: check_existing
      run: |
        echo "🔍 Checking for existing deployment: ${{ env.DEPLOYMENT_ID }}"
        
        # Look for existing app with this deployment ID
        apps_response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/apps")
        
        existing_app=$(echo "$apps_response" | jq -r ".apps[] | select(.spec.name == \"budget-app-${{ env.DEPLOYMENT_ID }}\") | .id")
        
        if [ -n "$existing_app" ] && [ "$existing_app" != "null" ]; then
          echo "♻️ Found existing deployment: $existing_app"
          echo "Will replace existing deployment"
          echo "existing_app_id=$existing_app" >> $GITHUB_OUTPUT
          echo "is_redeployment=true" >> $GITHUB_OUTPUT
        else
          echo "🆕 No existing deployment found"
          echo "is_redeployment=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Cancel existing auto-terminate workflow
      if: steps.check_existing.outputs.is_redeployment == 'true'
      run: |
        echo "🛑 Canceling existing auto-terminate workflow for redeployment..."
        
        # Get running workflows for this repository
        runs_response=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=queued,in_progress")
        
        # Find auto-terminate workflows for this app
        existing_app_id="${{ steps.check_existing.outputs.existing_app_id }}"
        
        echo "$runs_response" | jq -r '.workflow_runs[] | select(.name == "Auto-Terminate Deployment") | .id' | \
        while read run_id; do
          echo "Canceling workflow run: $run_id"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id/cancel"
        done
        
        echo "✅ Existing auto-terminate workflows canceled"
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Check for source code changes (caching)
      id: source_changes
      run: |
        # Create hash of relevant source files for caching
        SOURCE_HASH=$(find . -name "*.go" -o -name "go.mod" -o -name "go.sum" -o -name "Dockerfile.prod" | \
          sort | xargs cat | sha256sum | cut -d' ' -f1)
        
        echo "SOURCE_HASH=${SOURCE_HASH}" >> $GITHUB_ENV
        echo "source_hash=${SOURCE_HASH}" >> $GITHUB_OUTPUT
        echo "Source hash: ${SOURCE_HASH}"
        
        # Check if we have a cached image for this hash
        CACHE_KEY="docker-image-${{ env.DEPLOYMENT_ID }}-${SOURCE_HASH}"
        echo "CACHE_KEY=${CACHE_KEY}" >> $GITHUB_ENV
        echo "cache_key=${CACHE_KEY}" >> $GITHUB_OUTPUT
    
    - name: Check Docker build cache
      id: docker_cache
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ env.CACHE_KEY }}
        restore-keys: |
          docker-image-${{ env.DEPLOYMENT_ID }}-
    
    - name: Build and push Docker image
      run: |
        echo "🐳 Building Docker image..."
        echo "Cache key: ${{ env.CACHE_KEY }}"
        echo "Cache hit: ${{ steps.docker_cache.outputs.cache-hit }}"
        
        # Login to GitHub Container Registry
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # Build with cache
        docker buildx build \
          --file Dockerfile.prod \
          --tag ghcr.io/${{ github.repository }}/budget-app:${{ env.DEPLOYMENT_ID }} \
          --tag ghcr.io/${{ github.repository }}/budget-app:latest \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          --push \
          .
        
        # Move cache
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
        
        echo "✅ Docker image built and pushed"
        echo "IMAGE_TAG=${{ env.DEPLOYMENT_ID }}" >> $GITHUB_ENV
    
    - name: Prepare Terraform configuration
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        do_token = "${{ env.DO_TOKEN }}"
        region = "nyc1"
        deployment_id = "${{ env.DEPLOYMENT_ID }}"
        github_repo = "${{ github.repository }}"
        docker_image_tag = "${{ env.DEPLOYMENT_ID }}"
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        auto_terminate_minutes = 30
        EOF
        
        echo "✅ Terraform configuration prepared"
    
    - name: Import existing resources (if redeployment)
      if: steps.check_existing.outputs.is_redeployment == 'true'
      run: |
        cd terraform
        terraform init
        
        existing_app_id="${{ steps.check_existing.outputs.existing_app_id }}"
        echo "📥 Importing existing resources for redeployment..."
        
        # Import existing app
        terraform import digitalocean_app.budget_app "$existing_app_id" || echo "Failed to import app"
        
        # Try to find and import database
        db_name="budget-db-${{ env.DEPLOYMENT_ID }}"
        dbs_response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/databases")
        
        existing_db_id=$(echo "$dbs_response" | jq -r ".databases[] | select(.name == \"$db_name\") | .id")
        if [ -n "$existing_db_id" ] && [ "$existing_db_id" != "null" ]; then
          terraform import digitalocean_database_cluster.budget_db "$existing_db_id" || echo "Failed to import database"
        fi
        
        # Import project (always exists)
        project_id=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/projects" | jq -r '.projects[] | select(.name == "budget-develop") | .id')
        terraform import digitalocean_project.budget_develop "$project_id" || echo "Failed to import project"
        
        echo "✅ Existing resources imported"
    
    - name: Initialize Terraform (fresh deployment)
      if: steps.check_existing.outputs.is_redeployment == 'false'
      run: |
        cd terraform
        terraform init
        echo "✅ Terraform initialized for fresh deployment"
    
    - name: Deploy infrastructure
      id: deploy_infra
      run: |
        cd terraform
        
        echo "🚀 Deploying infrastructure..."
        
        if terraform plan -out=tfplan; then
          echo "✅ Terraform plan successful"
        else
          echo "❌ Terraform plan failed"
          echo "plan_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        if terraform apply -auto-approve tfplan; then
          echo "✅ Infrastructure deployed successfully"
          echo "deploy_success=true" >> $GITHUB_OUTPUT
          
          # Get outputs
          APP_URL=$(terraform output -raw app_url)
          APP_ID=$(terraform output -raw app_id)
          DB_HOST=$(terraform output -raw database_host)
          TOTAL_COST=$(terraform output -raw estimated_total_cost)
          
          echo "APP_URL=${APP_URL}" >> $GITHUB_ENV
          echo "APP_ID=${APP_ID}" >> $GITHUB_ENV
          echo "DB_HOST=${DB_HOST}" >> $GITHUB_ENV
          echo "TOTAL_COST=${TOTAL_COST}" >> $GITHUB_ENV
          
        else
          echo "❌ Infrastructure deployment failed"
          echo "deploy_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Wait for database to be ready
      run: |
        echo "⏳ Waiting for managed PostgreSQL to be ready..."
        
        # Wait for database to be in 'online' state
        timeout 600 bash -c '
          while true; do
            db_status=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
              "https://api.digitalocean.com/v2/databases" | \
              jq -r ".databases[] | select(.name == \"budget-db-${{ env.DEPLOYMENT_ID }}\") | .status")
            
            echo "Database status: $db_status"
            
            if [ "$db_status" = "online" ]; then
              echo "✅ Database is ready"
              break
            fi
            
            sleep 15
          done
        '
    
    - name: Run database migrations
      id: migrations
      run: |
        echo "🗄️ Running database migrations..."
        
        # Build a temporary migration runner
        docker build -f Dockerfile.prod -t migration-runner .
        
        # Run migrations using the built image
        docker run --rm \
          -e BUDGET_DATABASE_URL="${{ env.DB_HOST }}" \
          migration-runner ./budget migrate
        
        if [ $? -eq 0 ]; then
          echo "✅ Database migrations completed successfully"
          echo "migrations_success=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Database migrations failed"
          echo "migrations_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Wait for App Platform deployment
      run: |
        echo "⏳ Waiting for App Platform deployment to be ready..."
        
        timeout 300 bash -c '
          while ! curl -f --connect-timeout 10 ${{ env.APP_URL }}/health 2>/dev/null; do
            echo "Waiting for application to be ready..."
            sleep 15
          done
        '
        
        echo "✅ Application is ready and healthy"
    
    - name: Calculate termination time
      id: termination_time
      run: |
        # Calculate when the deployment will terminate
        TERMINATION_TIME=$(date -u -d '+30 minutes' '+%Y-%m-%d %H:%M UTC')
        echo "TERMINATION_TIME=${TERMINATION_TIME}" >> $GITHUB_ENV
        echo "termination_time=${TERMINATION_TIME}" >> $GITHUB_OUTPUT
        echo "Termination scheduled for: ${TERMINATION_TIME}"
    
    - name: Schedule auto-termination
      if: success()
      run: |
        echo "🕐 Scheduling auto-termination..."
        
        response=$(curl -w "%{http_code}" -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-terminate.yml/dispatches" \
          -d "{
            \"ref\": \"${{ github.head_ref }}\",
            \"inputs\": {
              \"app_id\": \"${{ env.APP_ID }}\",
              \"app_url\": \"${{ env.APP_URL }}\",
              \"pr_number\": \"${{ github.event.number }}\",
              \"deployment_id\": \"${{ env.DEPLOYMENT_ID }}\"
            }
          }")
        
        http_code="${response: -3}"
        
        if [ "$http_code" = "204" ]; then
          echo "✅ Auto-termination scheduled successfully"
        else
          echo "⚠️ Failed to schedule auto-termination (HTTP: $http_code)"
          echo "Manual cleanup: terraform destroy -auto-approve"
        fi
    
    - name: Comment on PR with success
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const message = `## ✅ Deployment Successful

**🌐 URL:** ${{ env.APP_URL }}
**🆔 ID:** ${{ env.DEPLOYMENT_ID }}
**💰 Cost:** ${{ env.TOTAL_COST }}
**⏰ Terminates:** ${{ env.TERMINATION_TIME }}`;

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Cleanup on failure
      if: failure()
      run: |
        echo "🧹 Cleaning up partial deployment due to failure..."
        
        cd terraform
        
        # Import any partially created resources and destroy them
        if [ -f terraform.tfvars ]; then
          terraform init || true
          
          # Try to import and destroy any partially created resources
          terraform destroy -auto-approve || echo "Cleanup may be incomplete"
          echo "✅ Partial deployment cleaned up"
        fi
    
    - name: Comment on PR with failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const workflow = 'Deploy Budget App';
          let failedStep = 'Unknown';
          let errorMessage = 'Unknown error occurred';
          
          // Determine which step failed based on step outputs
          if ('${{ steps.ensure_project.outputs.project_exists }}' === 'false') {
            failedStep = 'Ensure shared project exists';
            errorMessage = 'Failed to create or access DigitalOcean project budget-develop';
          } else if ('${{ steps.deploy_infra.outputs.deploy_success }}' === 'false') {
            failedStep = 'Deploy infrastructure';
            errorMessage = 'Terraform deployment failed - check logs for details';
          } else if ('${{ steps.migrations.outputs.migrations_success }}' === 'false') {
            failedStep = 'Run database migrations';
            errorMessage = 'Database migration failed - schema may be incompatible';
          } else {
            failedStep = 'Wait for App Platform deployment';
            errorMessage = 'Application failed to start or health check failed';
          }
          
          const message = `## ❌ Deployment Failed

**Workflow:** ${workflow}
**Step:** ${failedStep}
**Error:**
\`\`\`
${errorMessage}
\`\`\`
**Cleanup:** Partial deployment cleaned up automatically`;

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });