name: Deploy Budget App to DigitalOcean

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['**']  # Trigger for PRs targeting any branch

env:
  # DigitalOcean configuration
  DO_TOKEN: ${{ secrets.DO_TOKEN }}
  
  # Deployment configuration
  DEPLOYMENT_TIMEOUT: 30  # minutes

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    
    # Only run on PR events to save costs
    if: github.event_name == 'pull_request'
    
    # Permissions needed for GitHub Container Registry
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    # No SSH keys needed - deployment happens via cloud-init
    
    - name: Generate unique deployment name
      run: |
        # Create a unique name for this deployment using PR info
        PR_NUMBER="${{ github.event.number }}"
        BRANCH_NAME=$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
        COMMIT_SHORT=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-8)
        DEPLOYMENT_NAME="budget-pr-${PR_NUMBER}-${BRANCH_NAME}-${COMMIT_SHORT}"
        echo "DEPLOYMENT_NAME=${DEPLOYMENT_NAME}" >> $GITHUB_ENV
        echo "Deployment name: ${DEPLOYMENT_NAME}"
    
    - name: Create Terraform variables file
      run: |
        cd terraform
        cat > terraform.tfvars << EOF
        # DigitalOcean Configuration
        do_token = "${{ secrets.DO_TOKEN }}"
        
        # Cost-optimized configuration
        region = "nyc1"
        droplet_size = "s-1vcpu-512mb-10gb"
        use_managed_db = false
        
        # No SSH configuration needed
        
        # Application Configuration
        app_port = "8080"
        app_env = "production"
        log_level = "info"
        
        # Auto-termination
        auto_terminate_minutes = 30
        
        # GitHub Integration
        github_repo = "${{ github.repository }}"
        github_branch = "${{ github.head_ref }}"
        docker_image_url = "${{ env.IMAGE_URL }}"
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        EOF
    
    - name: Build and push Docker image
      run: |
        echo "Building Docker image and pushing to GitHub Container Registry..."
        
        # Login to GitHub Container Registry
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # Build the Docker image
        docker build -f Dockerfile.prod -t ghcr.io/${{ github.repository }}/budget-app:${{ github.event.pull_request.head.sha }} .
        docker build -f Dockerfile.prod -t ghcr.io/${{ github.repository }}/budget-app:latest .
        
        # Push both tagged and latest versions
        docker push ghcr.io/${{ github.repository }}/budget-app:${{ github.event.pull_request.head.sha }}
        docker push ghcr.io/${{ github.repository }}/budget-app:latest
        
        echo "✅ Docker image pushed successfully"
        echo "IMAGE_URL=ghcr.io/${{ github.repository }}/budget-app:${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
    
    - name: Initialize Terraform
      run: |
        cd terraform
        terraform init
    
    - name: Plan Terraform deployment
      run: |
        cd terraform
        terraform plan -out=tfplan
    
    - name: Apply Terraform deployment
      run: |
        cd terraform
        terraform apply -auto-approve tfplan
        
        # Get deployment outputs
        APP_IP=$(terraform output -raw app_ip_address)
        APP_URL=$(terraform output -raw application_url)
        COST=$(terraform output -raw estimated_monthly_cost)
        
        echo "APP_IP=${APP_IP}" >> $GITHUB_ENV
        echo "APP_URL=${APP_URL}" >> $GITHUB_ENV
        echo "ESTIMATED_COST=${COST}" >> $GITHUB_ENV
        
        echo "✅ Infrastructure deployed successfully!"
        echo "📍 Application IP: ${APP_IP}"
        echo "🌐 Application URL: ${APP_URL}"
        echo "💰 Estimated cost: ${COST}"
    
    - name: Debug deployment status
      run: |
        echo "🔍 Debugging deployment status..."
        echo "Droplet IP: ${{ env.APP_IP }}"
        echo "Expected Image: ${{ env.IMAGE_URL }}"
        echo "Repository: ${{ github.repository }}"
        
        # Check if droplet is responding at all
        echo "Testing basic connectivity..."
        if ping -c 3 ${{ env.APP_IP }}; then
          echo "✅ Droplet is reachable via ping"
        else
          echo "❌ Droplet is not reachable via ping"
        fi
        
        # Check what ports are open
        echo "Checking open ports..."
        for port in 80 443 8080 9999; do
          echo "Testing port $port..."
          if timeout 5 bash -c "</dev/tcp/${{ env.APP_IP }}/$port"; then
            echo "✅ Port $port is open"
          else
            echo "❌ Port $port is closed/filtered"
          fi
        done
        
        # Try to get any HTTP response (even errors)
        echo "Testing HTTP connectivity on different ports..."
        for port in 8080 80 9999; do
          echo "--- Testing port $port ---"
          curl -v --connect-timeout 10 --max-time 15 http://${{ env.APP_IP }}:$port/ || echo "No response on port $port"
        done

    - name: Wait for pre-built image deployment to complete
      run: |
        echo "Waiting for pre-built image deployment..."
        echo "This should be much faster - typically 2-3 minutes"
        
        # First check if status endpoint is available (port 9999)
        echo "Checking for status endpoint..."
        for i in {1..10}; do
          if curl -f --connect-timeout 5 http://${{ env.APP_IP }}:9999/status 2>/dev/null; then
            echo "✅ Status endpoint is available!"
            curl -s http://${{ env.APP_IP }}:9999/status | jq '.' || curl -s http://${{ env.APP_IP }}:9999/status
            break
          else
            echo "Status endpoint not ready yet (attempt $i/10)..."
            sleep 15
          fi
        done
        
        # Wait for application to be accessible with detailed progress
        timeout 300 bash -c '
          attempt=1
          while ! curl -f --connect-timeout 5 http://${{ env.APP_IP }}:8080/health 2>/dev/null; do
            echo "Waiting for application to be ready (attempt $attempt)..."
            
            # Check status endpoint every few attempts
            if [ $((attempt % 4)) -eq 0 ]; then
              echo "--- Status Check (attempt $attempt) ---"
              curl -s --connect-timeout 3 http://${{ env.APP_IP }}:9999/status 2>/dev/null | jq -r ".timestamp, .cloud_init_finished, .docker_running, .services, .deployment_log[-3:][]?" 2>/dev/null || echo "Status endpoint not available"
            fi
            
            attempt=$((attempt + 1))
            sleep 15
          done
        '
        
        echo "✅ Application is now accessible!"
    
    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        
        # Final health check
        if curl -f http://${{ env.APP_IP }}:8080/health; then
          echo "✅ Deployment verification successful!"
          echo "🚀 Application is running at: ${{ env.APP_URL }}"
        else
          echo "❌ Health check failed"
          exit 1
        fi
    
    - name: Update deployment status
      run: |
        echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**PR:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.event.pull_request.head.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Application URL:** ${{ env.APP_URL }}" >> $GITHUB_STEP_SUMMARY
        echo "**Estimated Cost:** ${{ env.ESTIMATED_COST }}" >> $GITHUB_STEP_SUMMARY
        echo "**Auto-termination:** 30 minutes" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **Note:** This deployment will automatically terminate after 30 minutes to save costs." >> $GITHUB_STEP_SUMMARY
    
    - name: Provide debugging info on failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo ""
        echo "🔍 DEBUGGING INFORMATION:"
        echo "Status URL: http://${{ env.APP_IP }}:9999/status"
        echo "Droplet IP: ${{ env.APP_IP }}"
        echo "Expected Image: ${{ env.IMAGE_URL }}"
        echo ""
        echo "📋 You can check the status endpoint for detailed logs:"
        echo "curl http://${{ env.APP_IP }}:9999/status"
        echo ""
        echo "🏗️ The droplet will be PRESERVED for debugging (smart auto-termination)"
        echo "It will only terminate if the app becomes healthy, otherwise it stays up for investigation"
        echo ""
        echo "⚠️ Remember to manually destroy the droplet when done debugging to avoid charges:"
        echo "cd terraform && terraform destroy -auto-approve"

    - name: Comment on PR with deployment info
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🚀 Deployment Successful!
            
            Your PR has been deployed and is ready for testing:
            
            **🌐 Application URL:** ${{ env.APP_URL }}
            **💰 Estimated Cost:** ${{ env.ESTIMATED_COST }}
            **⏰ Auto-termination:** 30 minutes
            **🗃️ Database:** PostgreSQL (containerized, secure)
            **💻 Instance:** 512MB RAM droplet
            
            **PR Details:**
            - **Branch:** ${{ github.head_ref }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            
            ⚠️ **Note**: This deployment will automatically terminate after 30 minutes to save costs.
            
            Test your changes and provide feedback! 🎉`
          })
    
    - name: Comment on PR if deployment failed
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ❌ Deployment Failed
            
            The deployment for this PR failed. Please check the [GitHub Actions logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            
            **Common issues:**
            - Missing repository secrets (DO_TOKEN)
            - DigitalOcean API quota exceeded
            - Network connectivity issues
            - Cloud-init build failure (check droplet console logs)
            
            Please fix the issues and push a new commit to retry the deployment.`
          })