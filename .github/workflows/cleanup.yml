name: Process Scheduled Terminations

on:
  schedule:
    - cron: '*/5 * * * *'  # Run every 5 minutes
  workflow_dispatch:  # Allow manual triggering

jobs:
  process-terminations:
    runs-on: ubuntu-latest
    steps:
    - name: Process scheduled terminations
      uses: actions/github-script@v7
      with:
        script: |
          console.log('🔍 Checking for scheduled terminations...');
          
          // Get all open issues with auto-termination labels
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'auto-termination,scheduled',
            state: 'open'
          });
          
          console.log(`Found ${issues.data.length} scheduled termination(s)`);
          
          const now = new Date();
          let processedCount = 0;
          let terminatedCount = 0;
          
          for (const issue of issues.data) {
            const title = issue.title;
            const body = issue.body;
            
            // Extract app ID from title
            const appIdMatch = title.match(/Auto-Terminate: (.+)/);
            if (!appIdMatch) {
              console.log(`Skipping issue #${issue.number} - invalid title format`);
              continue;
            }
            
            const appId = appIdMatch[1];
            
            // Extract scheduled time from body
            const timeMatch = body.match(/\*\*Scheduled Termination:\*\* (.+)/);
            if (!timeMatch) {
              console.log(`Skipping issue #${issue.number} - no scheduled time found`);
              continue;
            }
            
            const scheduledTime = new Date(timeMatch[1]);
            const minutesUntilTermination = (scheduledTime - now) / (1000 * 60);
            
            console.log(`\nIssue #${issue.number}:`);
            console.log(`  App ID: ${appId}`);
            console.log(`  Scheduled: ${scheduledTime.toISOString()}`);
            console.log(`  Time until termination: ${minutesUntilTermination.toFixed(1)} minutes`);
            
            processedCount++;
            
            // Check if termination time has arrived (with 1-minute tolerance)
            if (minutesUntilTermination <= 1) {
              console.log(`  🗑️ Termination time reached, deleting app...`);
              
              try {
                // Delete the app via DigitalOcean API
                const response = await fetch(`https://api.digitalocean.com/v2/apps/${appId}`, {
                  method: 'DELETE',
                  headers: {
                    'Authorization': `Bearer ${{ secrets.DO_TOKEN }}`,
                    'Content-Type': 'application/json'
                  }
                });
                
                if (response.ok) {
                  console.log(`  ✅ Successfully terminated app ${appId}`);
                  terminatedCount++;
                  
                  // Close the issue with success comment
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `✅ **Auto-termination completed successfully**\n\nApp \`${appId}\` was terminated at ${now.toISOString()}\n\n*Processed by scheduled cleanup workflow*`
                  });
                  
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed'
                  });
                  
                } else if (response.status === 404) {
                  console.log(`  ℹ️ App ${appId} was already deleted`);
                  terminatedCount++;
                  
                  // Close the issue - app already gone
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `ℹ️ **App already terminated**\n\nApp \`${appId}\` was not found (already deleted)\n\n*Processed by scheduled cleanup workflow*`
                  });
                  
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed'
                  });
                  
                } else {
                  console.log(`  ❌ Failed to terminate app ${appId} (HTTP: ${response.status})`);
                  const errorText = await response.text();
                  console.log(`  Error: ${errorText}`);
                  
                  // Comment on issue about failure
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `❌ **Auto-termination failed**\n\nFailed to delete app \`${appId}\` (HTTP ${response.status})\n\nError: ${errorText}\n\n**Manual cleanup required:**\n\`\`\`bash\ncurl -X DELETE -H "Authorization: Bearer YOUR_DO_TOKEN" "https://api.digitalocean.com/v2/apps/${appId}"\n\`\`\``
                  });
                }
                
              } catch (error) {
                console.log(`  ❌ Exception terminating app ${appId}: ${error.message}`);
                
                // Comment on issue about exception
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `❌ **Auto-termination exception**\n\nException while deleting app \`${appId}\`: ${error.message}\n\n**Manual cleanup required**`
                });
              }
            } else {
              console.log(`  ⏰ Waiting ${minutesUntilTermination.toFixed(1)} more minutes`);
            }
          }
          
          console.log(`\n🏁 Cleanup Summary:`);
          console.log(`  Processed: ${processedCount} scheduled terminations`);
          console.log(`  Terminated: ${terminatedCount} apps`);
          console.log(`  Waiting: ${processedCount - terminatedCount} apps`);
          
          // Update GitHub Actions summary
          core.summary.addHeading('🗑️ Scheduled Termination Processing');
          core.summary.addTable([
            [{data: 'Metric', header: true}, {data: 'Count', header: true}],
            ['Scheduled Terminations Found', processedCount.toString()],
            ['Apps Terminated', terminatedCount.toString()],
            ['Apps Still Waiting', (processedCount - terminatedCount).toString()],
            ['Next Check', '5 minutes']
          ]);
          await core.summary.write();