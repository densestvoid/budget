name: Auto-Terminate Deployment

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'DigitalOcean App ID to terminate'
        required: true
        type: string
      app_url:
        description: 'Application URL'
        required: true
        type: string
      pr_number:
        description: 'PR number for tracking'
        required: true
        type: string

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  auto-terminate:
    runs-on: ubuntu-latest
    
    # Permissions for commenting on PRs
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    # Use environment with wait timer - this is the key!
    environment: 
      name: termination-delay
      # The environment will have a 30-minute wait timer configured
      # This delays the job WITHOUT using runner time
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Validate termination inputs
      id: validate
      run: |
        APP_ID="${{ github.event.inputs.app_id }}"
        APP_URL="${{ github.event.inputs.app_url }}"
        PR_NUMBER="${{ github.event.inputs.pr_number }}"
        
        echo "🗑️ Auto-termination workflow started"
        echo "App ID: $APP_ID"
        echo "App URL: $APP_URL" 
        echo "PR Number: #$PR_NUMBER"
        echo "Triggered at: $(date -u)"
        echo "Method: Terraform destroy (proper state management)"
        
        # Validate required inputs
        if [ -z "$APP_ID" ] || [ -z "$APP_URL" ] || [ -z "$PR_NUMBER" ]; then
          echo "❌ Error: Missing required inputs"
          exit 1
        fi
        
        echo "✅ Inputs validated, proceeding with Terraform destroy"
        echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
        echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
    
    - name: Check app health before termination
      id: health_check
      run: |
        APP_URL="${{ steps.validate.outputs.app_url }}"
        
        echo "🩺 Checking app health before termination..."
        
        # Test if app is still responding
        if curl -f --connect-timeout 10 --max-time 15 "$APP_URL/health" >/dev/null 2>&1; then
          echo "✅ App is healthy and responding"
          echo "should_terminate=true" >> $GITHUB_OUTPUT
          echo "health_status=healthy" >> $GITHUB_OUTPUT
        else
          echo "❌ App is not responding"
          echo "should_terminate=maybe" >> $GITHUB_OUTPUT
          echo "health_status=unhealthy" >> $GITHUB_OUTPUT
          
          # Check if app still exists via DO API
          APP_ID="${{ steps.validate.outputs.app_id }}"
          echo "Checking if app still exists via DigitalOcean API..."
          
          response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/apps/$APP_ID")
          
          if echo "$response" | jq -e '.app' >/dev/null 2>&1; then
            app_phase=$(echo "$response" | jq -r '.app.phase')
            echo "ℹ️  App exists in DigitalOcean (phase: $app_phase) but not responding"
            echo "Will attempt termination anyway"
            echo "should_terminate=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  App no longer exists in DigitalOcean - already terminated"
            echo "should_terminate=false" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Recreate Terraform configuration
      run: |
        echo "🔧 Recreating Terraform configuration for destroy operation..."
        cd terraform
        
        # Recreate terraform.tfvars with same configuration used for deployment
        cat > terraform.tfvars << EOF
        # DigitalOcean Configuration
        do_token = "${{ env.DO_TOKEN }}"
        
        # Cost-optimized configuration
        region = "nyc1"
        
        # Application Configuration
        app_port = "8080"
        app_env = "production"
        log_level = "info"
        
        # Auto-termination
        auto_terminate_minutes = 30
        
        # GitHub Integration (from original deployment)
        github_repo = "${{ github.repository }}"
        github_branch = "${{ github.ref_name }}"
        docker_image_tag = "latest"  # Not needed for destroy
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        EOF
        
        echo "✅ Terraform configuration recreated"
    
    - name: Download Terraform state from repository
      run: |
        APP_ID="${{ steps.validate.outputs.app_id }}"
        STATE_BRANCH="terraform-state-$APP_ID"
        
        echo "📦 Downloading Terraform state from branch: $STATE_BRANCH"
        
        # Fetch the state branch
        git fetch origin "$STATE_BRANCH"
        
        # Get the terraform state and vars from the branch
        git show "origin/$STATE_BRANCH:terraform.tfstate" > terraform/terraform.tfstate
        git show "origin/$STATE_BRANCH:terraform.tfvars" > terraform/terraform.tfvars
        
        echo "✅ Terraform state and vars downloaded from branch"
        echo "State file size: $(du -h terraform/terraform.tfstate)"
    
    - name: Initialize Terraform
      run: |
        cd terraform
        
        # Check if state file was downloaded
        if [ -f terraform.tfstate ]; then
          echo "✅ Terraform state downloaded successfully"
          echo "State file size: $(du -h terraform.tfstate)"
          
          # Show what resources are in the state
          echo "Resources in state:"
          terraform show | grep -E "resource \".*\"" || echo "No resources found in show output"
        else
          echo "❌ Terraform state file not found"
          echo "Available files:"
          ls -la
          exit 1
        fi
        
        terraform init
        echo "✅ Terraform initialized with existing state"
    
    - name: Terminate deployment via Terraform destroy
      if: steps.health_check.outputs.should_terminate == 'true'
      id: terminate
      run: |
        APP_ID="${{ steps.validate.outputs.app_id }}"
        APP_URL="${{ steps.validate.outputs.app_url }}"
        
        echo "🗑️ Terminating deployment $APP_ID via Terraform destroy..."
        echo "Termination time: $(date -u)"
        echo "Method: terraform destroy (proper state management)"
        
        cd terraform
        
        # Run terraform destroy
        if terraform destroy -auto-approve; then
          echo "✅ Deployment terminated successfully via Terraform"
          echo "🧹 All resources cleaned up properly"
          echo "📊 Terraform state is now clean"
          echo "result=success" >> $GITHUB_OUTPUT
          
          # Clean up the state branch
          echo "🗑️ Cleaning up state branch..."
          STATE_BRANCH="terraform-state-$APP_ID"
          git push origin --delete "$STATE_BRANCH" || echo "State branch already deleted or not found"
          echo "✅ State branch cleaned up"
          
        else
          echo "❌ Terraform destroy failed"
          echo "📋 Terraform state may be inconsistent"
          echo "🔧 Manual cleanup may be required"
          echo "result=failed" >> $GITHUB_OUTPUT
          
          # Show terraform state for debugging
          echo "Current Terraform state:"
          terraform show || echo "Failed to show state"
          
          # Keep state branch for debugging if destroy failed
          echo "🔍 State branch preserved for debugging: terraform-state-$APP_ID"
        fi
    
    - name: Comment on PR with termination result
      uses: actions/github-script@v7
      with:
        script: |
          const appId = '${{ steps.validate.outputs.app_id }}';
          const healthStatus = '${{ steps.health_check.outputs.health_status }}';
          const shouldTerminate = '${{ steps.health_check.outputs.should_terminate }}';
          const terminationResult = '${{ steps.terminate.outputs.result }}';
          const prNumber = '${{ steps.validate.outputs.pr_number }}';
          
          let message = `## 🕐 Auto-Termination Report\n\n`;
          message += `**App ID:** ${appId}\n`;
          message += `**Termination Time:** ${new Date().toISOString()}\n`;
          message += `**Health Status:** ${healthStatus}\n\n`;
          
          if (shouldTerminate === 'false') {
            message += `✅ **Result:** App was already terminated - no action needed\n`;
          } else if (terminationResult === 'success') {
            message += `✅ **Result:** Deployment terminated successfully via Terraform destroy\n`;
            message += `🧹 All resources cleaned up properly with proper state management\n`;
          } else if (terminationResult === 'failed') {
            message += `❌ **Result:** Terraform destroy failed - manual cleanup may be required\n`;
            message += `\n**Manual cleanup:** \`cd terraform && terraform destroy -auto-approve\`\n`;
          } else {
            message += `❓ **Result:** Unknown termination result: ${terminationResult}\n`;
          }
          
          message += `\n*Auto-termination completed via environment wait timer (no runner time wasted during delay)*`;
          
          github.rest.issues.createComment({
            issue_number: parseInt(prNumber),
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Update workflow summary
      run: |
        echo "## 🗑️ Auto-Termination Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**App ID:** ${{ steps.validate.outputs.app_id }}" >> $GITHUB_STEP_SUMMARY
        echo "**Health Status:** ${{ steps.health_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Should Terminate:** ${{ steps.health_check.outputs.should_terminate }}" >> $GITHUB_STEP_SUMMARY
        echo "**Termination Result:** ${{ steps.terminate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
        echo "**Completed At:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Environment wait timer prevented runner time waste during 30-minute delay*" >> $GITHUB_STEP_SUMMARY