name: Auto-Terminate Deployment

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'DigitalOcean App ID to terminate'
        required: true
        type: string
      app_url:
        description: 'Application URL'
        required: true
        type: string
      pr_number:
        description: 'PR number for tracking'
        required: true
        type: string
      deployment_id:
        description: 'Unique deployment ID'
        required: true
        type: string

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  auto-terminate:
    runs-on: ubuntu-latest
    
    # Permissions for commenting on PRs
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    # Use environment with wait timer - this is the key!
    environment: 
      name: termination-delay
      # The environment will have a 30-minute wait timer configured
      # This delays the job WITHOUT using runner time
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7
    
    - name: Validate termination inputs
      id: validate
      run: |
        APP_ID="${{ github.event.inputs.app_id }}"
        APP_URL="${{ github.event.inputs.app_url }}"
        PR_NUMBER="${{ github.event.inputs.pr_number }}"
        DEPLOYMENT_ID="${{ github.event.inputs.deployment_id }}"
        
        echo "🗑️ Auto-termination workflow started"
        echo "Deployment ID: $DEPLOYMENT_ID"
        echo "App ID: $APP_ID"
        echo "App URL: $APP_URL" 
        echo "PR Number: #$PR_NUMBER"
        echo "Triggered at: $(date -u)"
        
        # Validate required inputs
        if [ -z "$APP_ID" ] || [ -z "$APP_URL" ] || [ -z "$PR_NUMBER" ] || [ -z "$DEPLOYMENT_ID" ]; then
          echo "❌ Error: Missing required inputs"
          exit 1
        fi
        
        echo "✅ Inputs validated"
        echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
        echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
    
    - name: Check app health before termination
      id: health_check
      run: |
        APP_URL="${{ steps.validate.outputs.app_url }}"
        
        echo "🩺 Checking app health before termination..."
        
        # Test if app is still responding
        if curl -f --connect-timeout 10 --max-time 15 "$APP_URL/health" >/dev/null 2>&1; then
          echo "✅ App is healthy and responding"
          echo "should_terminate=true" >> $GITHUB_OUTPUT
          echo "health_status=healthy" >> $GITHUB_OUTPUT
        else
          echo "❌ App is not responding"
          echo "should_terminate=maybe" >> $GITHUB_OUTPUT
          echo "health_status=unhealthy" >> $GITHUB_OUTPUT
          
          # Check if app still exists via DO API
          APP_ID="${{ steps.validate.outputs.app_id }}"
          echo "Checking if app still exists via DigitalOcean API..."
          
          response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/apps/$APP_ID")
          
          if echo "$response" | jq -e '.app' >/dev/null 2>&1; then
            app_phase=$(echo "$response" | jq -r '.app.phase')
            echo "ℹ️  App exists in DigitalOcean (phase: $app_phase) but not responding"
            echo "Will attempt termination anyway"
            echo "should_terminate=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  App no longer exists in DigitalOcean - already terminated"
            echo "should_terminate=false" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Setup Terraform configuration for destroy
      id: setup
      run: |
        echo "🔧 Setting up Terraform configuration for destroy..."
        cd terraform
        
        DEPLOYMENT_ID="${{ steps.validate.outputs.deployment_id }}"
        
        # Create terraform.tfvars for destroy operation
        cat > terraform.tfvars << EOF
        do_token = "${{ env.DO_TOKEN }}"
        region = "nyc1"
        deployment_id = "$DEPLOYMENT_ID"
        github_repo = "${{ github.repository }}"
        docker_image_tag = "$DEPLOYMENT_ID"
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        auto_terminate_minutes = 30
        EOF
        
        echo "✅ Terraform configuration created for deployment: $DEPLOYMENT_ID"
        echo "setup_success=true" >> $GITHUB_OUTPUT
    
    - name: Initialize Terraform and select workspace
      id: init
      env:
        TF_WORKSPACE: ${{ steps.validate.outputs.deployment_id }}
      run: |
        cd terraform
        
        echo "🔧 Initializing Terraform with remote backend..."
        echo "Workspace: $TF_WORKSPACE"
        
        # Set Terraform Cloud token
        cat > ~/.terraformrc << EOF
        credentials "app.terraform.io" {
          token = "${{ secrets.TF_API_TOKEN }}"
        }
        EOF
        
        echo "🔧 Initializing Terraform with workspace: $TF_WORKSPACE"
        
        if terraform init; then
          echo "✅ Terraform initialized successfully"
          echo "init_success=true" >> $GITHUB_OUTPUT
          
          # Show what resources exist in this workspace
          echo "📋 Resources in workspace:"
          terraform state list || echo "No resources in workspace"
        else
          echo "❌ Terraform initialization failed"
          echo "init_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    # No import needed - workspace contains the deployment state automatically
    
    - name: Destroy deployment and cleanup workspace
      if: steps.health_check.outputs.should_terminate == 'true' && steps.init.outputs.init_success == 'true'
      id: destroy
      run: |
        DEPLOYMENT_ID="${{ steps.validate.outputs.deployment_id }}"
        
        echo "🗑️ Destroying deployment: $DEPLOYMENT_ID"
        echo "Termination time: $(date -u)"
        echo "Note: Shared project 'budget-develop' will be preserved"
        
        cd terraform
        
        # Show what will be destroyed
        echo "📋 Resources in workspace:"
        terraform state list
        
        # Run terraform destroy
        echo "🗑️ Executing terraform destroy..."
        if terraform destroy -auto-approve; then
          echo "✅ Deployment destroyed successfully"
          echo "🧹 All resources cleaned up"
          echo "destroy_success=true" >> $GITHUB_OUTPUT
          
          # Note: Terraform Cloud workspaces are automatically cleaned up
          echo "📂 Workspace will be automatically cleaned up by Terraform Cloud"
        else
          echo "❌ Terraform destroy failed"
          echo "destroy_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Comment on PR with termination result
      uses: actions/github-script@v7
      with:
        script: |
          const deploymentId = '${{ steps.validate.outputs.deployment_id }}';
          const shouldTerminate = '${{ steps.health_check.outputs.should_terminate }}';
          const destroySuccess = '${{ steps.destroy.outputs.destroy_success }}';
          const setupSuccess = '${{ steps.setup.outputs.setup_success }}';
          const initSuccess = '${{ steps.init.outputs.init_success }}';
          const importSuccess = '${{ steps.import.outputs.import_success }}';
          const prNumber = '${{ steps.validate.outputs.pr_number }}';
          
          let message;
          
          if (shouldTerminate === 'false') {
            message = `## ✅ Auto-Termination Completed\n\n**🆔 ID:** ${deploymentId}\n**Result:** Already terminated`;
          } else if (destroySuccess === 'true') {
            message = `## ✅ Auto-Termination Completed\n\n**🆔 ID:** ${deploymentId}\n**Result:** Successfully destroyed`;
          } else {
            // Determine which step failed for error message
            let failedStep = 'Unknown';
            let errorMsg = 'Unknown error occurred';
            
            if (setupSuccess !== 'true') {
              failedStep = 'Setup Terraform configuration';
              errorMsg = 'Failed to create terraform.tfvars';
            } else if (initSuccess !== 'true') {
              failedStep = 'Initialize Terraform';
              errorMsg = 'terraform init failed';
            } else if (importSuccess !== 'true') {
              failedStep = 'Import deployment resources';
              errorMsg = 'Failed to import app or database into Terraform state';
            } else {
              failedStep = 'Destroy deployment';
              errorMsg = 'terraform destroy failed - some resources may still exist';
            }
            
            message = `## ❌ Auto-Termination Failed\n\n**Workflow:** Auto-Terminate Deployment\n**Step:** ${failedStep}\n**Error:**\n\`\`\`\n${errorMsg}\n\`\`\`\n**Cleanup:** Manual cleanup may be required`;
          }
          
          github.rest.issues.createComment({
            issue_number: parseInt(prNumber),
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Update workflow summary
      run: |
        echo "## 🗑️ Auto-Termination Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**App ID:** ${{ steps.validate.outputs.app_id }}" >> $GITHUB_STEP_SUMMARY
        echo "**Health Status:** ${{ steps.health_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Should Terminate:** ${{ steps.health_check.outputs.should_terminate }}" >> $GITHUB_STEP_SUMMARY
        echo "**Termination Result:** ${{ steps.terminate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
        echo "**Completed At:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Environment wait timer prevented runner time waste during 30-minute delay*" >> $GITHUB_STEP_SUMMARY