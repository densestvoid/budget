name: Auto-Terminate Deployment

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'DigitalOcean App ID to terminate'
        required: true
        type: string
      app_url:
        description: 'Application URL'
        required: true
        type: string
      pr_number:
        description: 'PR number for tracking'
        required: true
        type: string

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  auto-terminate:
    runs-on: ubuntu-latest
    
    # Permissions for commenting on PRs
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    # Use environment with wait timer - this is the key!
    environment: 
      name: termination-delay
      # The environment will have a 30-minute wait timer configured
      # This delays the job WITHOUT using runner time
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Validate termination inputs
      id: validate
      run: |
        APP_ID="${{ github.event.inputs.app_id }}"
        APP_URL="${{ github.event.inputs.app_url }}"
        PR_NUMBER="${{ github.event.inputs.pr_number }}"
        
        echo "🗑️ Auto-termination workflow started"
        echo "App ID: $APP_ID"
        echo "App URL: $APP_URL" 
        echo "PR Number: #$PR_NUMBER"
        echo "Triggered at: $(date -u)"
        echo "Method: Terraform destroy (proper state management)"
        
        # Validate required inputs
        if [ -z "$APP_ID" ] || [ -z "$APP_URL" ] || [ -z "$PR_NUMBER" ]; then
          echo "❌ Error: Missing required inputs"
          exit 1
        fi
        
        echo "✅ Inputs validated, proceeding with Terraform destroy"
        echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
        echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
    
    - name: Check app health before termination
      id: health_check
      run: |
        APP_URL="${{ steps.validate.outputs.app_url }}"
        
        echo "🩺 Checking app health before termination..."
        
        # Test if app is still responding
        if curl -f --connect-timeout 10 --max-time 15 "$APP_URL/health" >/dev/null 2>&1; then
          echo "✅ App is healthy and responding"
          echo "should_terminate=true" >> $GITHUB_OUTPUT
          echo "health_status=healthy" >> $GITHUB_OUTPUT
        else
          echo "❌ App is not responding"
          echo "should_terminate=maybe" >> $GITHUB_OUTPUT
          echo "health_status=unhealthy" >> $GITHUB_OUTPUT
          
          # Check if app still exists via DO API
          APP_ID="${{ steps.validate.outputs.app_id }}"
          echo "Checking if app still exists via DigitalOcean API..."
          
          response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/apps/$APP_ID")
          
          if echo "$response" | jq -e '.app' >/dev/null 2>&1; then
            app_phase=$(echo "$response" | jq -r '.app.phase')
            echo "ℹ️  App exists in DigitalOcean (phase: $app_phase) but not responding"
            echo "Will attempt termination anyway"
            echo "should_terminate=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  App no longer exists in DigitalOcean - already terminated"
            echo "should_terminate=false" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Setup Terraform configuration for import
      id: setup
      run: |
        echo "🔧 Setting up Terraform configuration for import and destroy..."
        cd terraform
        
        # Create minimal terraform.tfvars for destroy operation
        cat > terraform.tfvars << EOF
        # DigitalOcean Configuration
        do_token = "${{ env.DO_TOKEN }}"
        
        # Minimal configuration for destroy
        region = "nyc1"
        app_port = "8080"
        auto_terminate_minutes = 30
        github_repo = "${{ github.repository }}"
        github_branch = "${{ github.ref_name }}"
        docker_image_tag = "latest"
        github_token = "${{ secrets.GITHUB_TOKEN }}"
        EOF
        
        echo "✅ Terraform configuration created"
        echo "setup_success=true" >> $GITHUB_OUTPUT
    
    - name: Initialize Terraform with fresh state
      id: init
      run: |
        cd terraform
        
        if terraform init; then
          echo "✅ Terraform initialized successfully"
          echo "init_success=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Terraform initialization failed"
          echo "init_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Import deployment resources
      id: import
      run: |
        cd terraform
        
        APP_ID="${{ steps.validate.outputs.app_id }}"
        echo "📥 Importing deployment resources for $APP_ID..."
        
        # Extract random hex from app ID or app name
        # Get app details from DigitalOcean API
        echo "Getting app details from DigitalOcean API..."
        app_response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/apps/$APP_ID")
        
        if echo "$app_response" | jq -e '.app' >/dev/null 2>&1; then
          app_name=$(echo "$app_response" | jq -r '.app.spec.name')
          echo "Found app: $app_name"
          
          # Extract random hex from app name (budget-app-{random_hex})
          random_hex=$(echo "$app_name" | sed 's/budget-app-//')
          echo "Extracted random hex: $random_hex"
          
          # Import the DigitalOcean app
          echo "Importing digitalocean_app.budget_app..."
          if terraform import digitalocean_app.budget_app "$APP_ID"; then
            echo "✅ App imported successfully"
            app_import_success=true
          else
            echo "❌ Failed to import app"
            app_import_success=false
          fi
          
          # Import the random_id resource
          echo "Importing random_id.deployment..."
          if terraform import random_id.deployment "$random_hex"; then
            echo "✅ Random ID imported successfully"
            random_import_success=true
          else
            echo "⚠️ Failed to import random_id (non-critical)"
            random_import_success=false
          fi
          
          # Verify what we have in state now
          echo "📋 Resources now in Terraform state:"
          terraform state list || echo "No resources in state"
          
          if [ "$app_import_success" = true ]; then
            echo "import_success=true" >> $GITHUB_OUTPUT
          else
            echo "import_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
        else
          echo "❌ Failed to get app details from DigitalOcean API"
          echo "Response: $app_response"
          echo "import_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Destroy imported deployment
      if: steps.health_check.outputs.should_terminate == 'true' && steps.import.outputs.import_success == 'true'
      id: destroy
      run: |
        APP_ID="${{ steps.validate.outputs.app_id }}"
        
        echo "🗑️ Destroying imported deployment $APP_ID..."
        echo "Termination time: $(date -u)"
        
        cd terraform
        
        # Show what will be destroyed
        echo "📋 Planning destruction..."
        terraform plan -destroy
        
        # Run terraform destroy
        echo "🗑️ Executing terraform destroy..."
        if terraform destroy -auto-approve; then
          echo "✅ Deployment destroyed successfully via Terraform"
          echo "🧹 All imported resources cleaned up properly"
          echo "📊 Terraform state is now clean"
          echo "destroy_success=true" >> $GITHUB_OUTPUT
          echo "resources_destroyed=true" >> $GITHUB_OUTPUT
        else
          echo "❌ Terraform destroy failed"
          echo "📋 Some resources may still exist"
          echo "destroy_success=false" >> $GITHUB_OUTPUT
          echo "resources_destroyed=false" >> $GITHUB_OUTPUT
          
          # Capture detailed error information
          echo "=== TERRAFORM DESTROY ERROR DETAILS ===" >> destroy_error.log
          terraform destroy -auto-approve 2>&1 | tee -a destroy_error.log || true
          echo "=== END ERROR DETAILS ===" >> destroy_error.log
        fi
    
    - name: Comment on PR with termination result
      uses: actions/github-script@v7
      with:
        script: |
          const appId = '${{ steps.validate.outputs.app_id }}';
          const appUrl = '${{ steps.validate.outputs.app_url }}';
          const healthStatus = '${{ steps.health_check.outputs.health_status }}';
          const shouldTerminate = '${{ steps.health_check.outputs.should_terminate }}';
          const setupSuccess = '${{ steps.setup.outputs.setup_success }}';
          const initSuccess = '${{ steps.init.outputs.init_success }}';
          const importSuccess = '${{ steps.import.outputs.import_success }}';
          const destroySuccess = '${{ steps.destroy.outputs.destroy_success }}';
          const resourcesDestroyed = '${{ steps.destroy.outputs.resources_destroyed }}';
          const prNumber = '${{ steps.validate.outputs.pr_number }}';
          
          let message = `## 🕐 Auto-Termination Report\n\n`;
          message += `**App ID:** ${appId}\n`;
          message += `**App URL:** ${appUrl}\n`;
          message += `**Termination Time:** ${new Date().toISOString()}\n`;
          message += `**Health Status:** ${healthStatus}\n\n`;
          
          // Step-by-step results
          message += `### 📋 Execution Steps:\n\n`;
          message += `- **Setup Terraform:** ${setupSuccess === 'true' ? '✅ Success' : '❌ Failed'}\n`;
          message += `- **Initialize Terraform:** ${initSuccess === 'true' ? '✅ Success' : '❌ Failed'}\n`;
          message += `- **Import Resources:** ${importSuccess === 'true' ? '✅ Success' : '❌ Failed'}\n`;
          message += `- **Destroy Deployment:** ${destroySuccess === 'true' ? '✅ Success' : '❌ Failed'}\n\n`;
          
          // Overall result
          if (shouldTerminate === 'false') {
            message += `### ✅ Result: App was already terminated\n\nNo action needed - app was not responding and may have been deleted already.\n`;
          } else if (destroySuccess === 'true') {
            message += `### ✅ Result: Deployment terminated successfully\n\n`;
            message += `- All resources imported and destroyed via Terraform\n`;
            message += `- Proper state management maintained\n`;
            message += `- Clean resource cleanup completed\n`;
          } else {
            message += `### ❌ Result: Termination failed\n\n`;
            
            if (setupSuccess !== 'true') {
              message += `**Setup failed:** Terraform configuration could not be created\n`;
            } else if (initSuccess !== 'true') {
              message += `**Initialization failed:** Terraform init failed\n`;
            } else if (importSuccess !== 'true') {
              message += `**Import failed:** Could not import deployment resources into Terraform state\n`;
              message += `- App may have been deleted manually\n`;
              message += `- App ID may be incorrect\n`;
              message += `- DigitalOcean API access issues\n`;
            } else if (destroySuccess !== 'true') {
              message += `**Destroy failed:** Terraform destroy encountered errors\n`;
              message += `- Some resources may still exist\n`;
              message += `- Manual cleanup may be required\n`;
            }
            
            message += `\n**Manual cleanup:**\n`;
            message += `\`\`\`bash\n`;
            message += `# Option 1: Direct API call\n`;
            message += `curl -X DELETE -H "Authorization: Bearer YOUR_DO_TOKEN" \\\n`;
            message += `  "https://api.digitalocean.com/v2/apps/${appId}"\n\n`;
            message += `# Option 2: Terraform (if import worked)\n`;
            message += `cd terraform && terraform destroy -auto-approve\n`;
            message += `\`\`\`\n`;
          }
          
          message += `\n---\n*Auto-termination via import-and-destroy method (no runner time wasted during 30-minute delay)*`;
          
          github.rest.issues.createComment({
            issue_number: parseInt(prNumber),
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Update workflow summary
      run: |
        echo "## 🗑️ Auto-Termination Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**App ID:** ${{ steps.validate.outputs.app_id }}" >> $GITHUB_STEP_SUMMARY
        echo "**Health Status:** ${{ steps.health_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Should Terminate:** ${{ steps.health_check.outputs.should_terminate }}" >> $GITHUB_STEP_SUMMARY
        echo "**Termination Result:** ${{ steps.terminate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
        echo "**Completed At:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Environment wait timer prevented runner time waste during 30-minute delay*" >> $GITHUB_STEP_SUMMARY