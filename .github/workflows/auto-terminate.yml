name: Auto-Terminate Deployment

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'DigitalOcean App ID to terminate'
        required: true
        type: string
      app_url:
        description: 'Application URL'
        required: true
        type: string
      pr_number:
        description: 'PR number for tracking'
        required: true
        type: string

env:
  DO_TOKEN: ${{ secrets.DO_TOKEN }}

jobs:
  auto-terminate:
    runs-on: ubuntu-latest
    
    # Permissions for commenting on PRs
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    # Use environment with wait timer - this is the key!
    environment: 
      name: termination-delay
      # The environment will have a 30-minute wait timer configured
      # This delays the job WITHOUT using runner time
    
    steps:
    - name: Validate termination inputs
      id: validate
      run: |
        APP_ID="${{ github.event.inputs.app_id }}"
        APP_URL="${{ github.event.inputs.app_url }}"
        PR_NUMBER="${{ github.event.inputs.pr_number }}"
        
        echo "🗑️ Auto-termination workflow started"
        echo "App ID: $APP_ID"
        echo "App URL: $APP_URL" 
        echo "PR Number: #$PR_NUMBER"
        echo "Triggered at: $(date -u)"
        
        # Validate required inputs
        if [ -z "$APP_ID" ] || [ -z "$APP_URL" ] || [ -z "$PR_NUMBER" ]; then
          echo "❌ Error: Missing required inputs"
          exit 1
        fi
        
        echo "✅ Inputs validated, proceeding with termination"
        echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
        echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
    
    - name: Check app health before termination
      id: health_check
      run: |
        APP_URL="${{ steps.validate.outputs.app_url }}"
        
        echo "🩺 Checking app health before termination..."
        
        # Test if app is still responding
        if curl -f --connect-timeout 10 --max-time 15 "$APP_URL/health" >/dev/null 2>&1; then
          echo "✅ App is healthy and responding"
          echo "should_terminate=true" >> $GITHUB_OUTPUT
          echo "health_status=healthy" >> $GITHUB_OUTPUT
        else
          echo "❌ App is not responding"
          echo "should_terminate=maybe" >> $GITHUB_OUTPUT
          echo "health_status=unhealthy" >> $GITHUB_OUTPUT
          
          # Check if app still exists via DO API
          APP_ID="${{ steps.validate.outputs.app_id }}"
          echo "Checking if app still exists via DigitalOcean API..."
          
          response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
            "https://api.digitalocean.com/v2/apps/$APP_ID")
          
          if echo "$response" | jq -e '.app' >/dev/null 2>&1; then
            app_phase=$(echo "$response" | jq -r '.app.phase')
            echo "ℹ️  App exists in DigitalOcean (phase: $app_phase) but not responding"
            echo "Will attempt termination anyway"
            echo "should_terminate=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  App no longer exists in DigitalOcean - already terminated"
            echo "should_terminate=false" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Terminate app
      if: steps.health_check.outputs.should_terminate == 'true'
      id: terminate
      run: |
        APP_ID="${{ steps.validate.outputs.app_id }}"
        
        echo "🗑️ Terminating app $APP_ID after environment wait timer..."
        echo "Termination time: $(date -u)"
        
        # First check if app exists
        echo "Checking app status before deletion..."
        check_response=$(curl -s -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          "https://api.digitalocean.com/v2/apps/$APP_ID")
        
        if echo "$check_response" | jq -e '.app' >/dev/null 2>&1; then
          app_name=$(echo "$check_response" | jq -r '.app.spec.name')
          app_phase=$(echo "$check_response" | jq -r '.app.phase')
          echo "App found: $app_name (phase: $app_phase)"
        else
          echo "App not found or API error"
          echo "$check_response"
        fi
        
        # Delete the app
        echo "Sending DELETE request..."
        response=$(curl -w "\nHTTP_CODE:%{http_code}" -s -X DELETE \
          -H "Authorization: Bearer ${{ env.DO_TOKEN }}" \
          -H "Content-Type: application/json" \
          "https://api.digitalocean.com/v2/apps/$APP_ID")
        
        # Parse response
        http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
        response_body=$(echo "$response" | sed '/HTTP_CODE:/d')
        
        echo "HTTP Code: $http_code"
        echo "Response Body: $response_body"
        
        if [ "$http_code" = "204" ]; then
          echo "✅ App terminated successfully"
          echo "result=success" >> $GITHUB_OUTPUT
        elif [ "$http_code" = "404" ]; then
          echo "ℹ️  App was already deleted"
          echo "result=already_deleted" >> $GITHUB_OUTPUT
        elif [ "$http_code" = "200" ]; then
          echo "ℹ️  Got 200 response - app may be in deletion process"
          echo "Response: $response_body"
          echo "result=deletion_initiated" >> $GITHUB_OUTPUT
        else
          echo "❌ Failed to terminate app (HTTP: $http_code)"
          echo "Response: $response_body"
          echo "result=failed" >> $GITHUB_OUTPUT
        fi
    
    - name: Comment on PR with termination result
      uses: actions/github-script@v7
      with:
        script: |
          const appId = '${{ steps.validate.outputs.app_id }}';
          const healthStatus = '${{ steps.health_check.outputs.health_status }}';
          const shouldTerminate = '${{ steps.health_check.outputs.should_terminate }}';
          const terminationResult = '${{ steps.terminate.outputs.result }}';
          const prNumber = '${{ steps.validate.outputs.pr_number }}';
          
          let message = `## 🕐 Auto-Termination Report\n\n`;
          message += `**App ID:** ${appId}\n`;
          message += `**Termination Time:** ${new Date().toISOString()}\n`;
          message += `**Health Status:** ${healthStatus}\n\n`;
          
          if (shouldTerminate === 'false') {
            message += `✅ **Result:** App was already terminated - no action needed\n`;
          } else if (terminationResult === 'success') {
            message += `✅ **Result:** App terminated successfully after 30-minute delay\n`;
          } else if (terminationResult === 'already_deleted') {
            message += `ℹ️ **Result:** App was already deleted by another process\n`;
          } else if (terminationResult === 'deletion_initiated') {
            message += `🔄 **Result:** App deletion initiated (HTTP 200 response)\n`;
            message += `The app may take a few minutes to fully terminate.\n`;
          } else if (terminationResult === 'failed') {
            message += `❌ **Result:** Termination failed - manual cleanup may be required\n`;
            message += `\n**Manual cleanup:** \`cd terraform && terraform destroy -auto-approve\`\n`;
          } else {
            message += `❓ **Result:** Unknown termination result: ${terminationResult}\n`;
          }
          
          message += `\n*Auto-termination completed via environment wait timer (no runner time wasted during delay)*`;
          
          github.rest.issues.createComment({
            issue_number: parseInt(prNumber),
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
    
    - name: Update workflow summary
      run: |
        echo "## 🗑️ Auto-Termination Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**App ID:** ${{ steps.validate.outputs.app_id }}" >> $GITHUB_STEP_SUMMARY
        echo "**Health Status:** ${{ steps.health_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Should Terminate:** ${{ steps.health_check.outputs.should_terminate }}" >> $GITHUB_STEP_SUMMARY
        echo "**Termination Result:** ${{ steps.terminate.outputs.result }}" >> $GITHUB_STEP_SUMMARY
        echo "**Completed At:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Environment wait timer prevented runner time waste during 30-minute delay*" >> $GITHUB_STEP_SUMMARY